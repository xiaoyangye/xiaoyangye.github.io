<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高考古诗文背诵卡片</title>
  <style>
    :root {
      --bg-1: #f7efe2;
      --bg-2: #ead8bc;
      --paper: rgba(255, 249, 238, 0.9);
      --paper-strong: rgba(255, 252, 247, 0.98);
      --ink: #2f2419;
      --muted: #7b6751;
      --line: rgba(95, 70, 45, 0.16);
      --accent: #9d5c2f;
      --accent-strong: #7d3f17;
      --accent-soft: rgba(157, 92, 47, 0.12);
      --shadow: 0 22px 60px rgba(92, 60, 31, 0.18);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --card-height: min(78vh, 800px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 30%),
        radial-gradient(circle at right 10% bottom 10%, rgba(157, 92, 47, 0.18), transparent 24%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      font-family: "STSong", "Songti SC", "Noto Serif SC", serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(120, 85, 55, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 85, 55, 0.02) 1px, transparent 1px);
      background-size: 26px 26px;
      pointer-events: none;
      opacity: 0.55;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    .hero {
      margin-bottom: 10px;
    }

    .hero-card,
    .panel,
    .shortcut-panel {
      background: var(--paper);
      border: 1px solid rgba(111, 82, 50, 0.12);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero-card {
      padding: 18px 22px 16px;
      overflow: hidden;
      position: relative;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      right: -70px;
      top: -50px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(157, 92, 47, 0.15), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-strong);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.4vw, 40px);
      line-height: 1.08;
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin: 8px 0 0;
      width: 100%;
      max-width: none;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .hero-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 252, 247, 0.82);
      border: 1px solid rgba(111, 82, 50, 0.08);
      color: var(--muted);
      font-size: 13px;
    }

    .hero-chip strong {
      color: var(--accent-strong);
      font-size: 16px;
      line-height: 1;
    }

    .panel {
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .control-block {
      display: grid;
      gap: 5px;
    }

    .control-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .mode-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button,
    select,
    input {
      font: inherit;
    }

    .mode-btn,
    .action-btn,
    .utility-btn {
      border: 1px solid rgba(118, 84, 55, 0.12);
      background: rgba(255, 252, 247, 0.82);
      color: var(--ink);
      border-radius: 999px;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
      cursor: pointer;
    }

    .mode-btn {
      padding: 8px 14px;
      min-width: 82px;
      font-size: 14px;
    }

    .mode-btn.active,
    .action-btn.primary,
    .utility-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff7ef;
      box-shadow: 0 12px 24px rgba(115, 59, 22, 0.24);
    }

    .mode-btn:hover,
    .action-btn:hover,
    .utility-btn:hover,
    select:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(100, 66, 37, 0.12);
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(118, 84, 55, 0.14);
      background: rgba(255, 252, 247, 0.88);
      color: var(--ink);
      outline: none;
      font-size: 14px;
    }

    .status-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .status-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .progress-wrap {
      height: 7px;
      background: rgba(115, 82, 54, 0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-bar {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #d19058);
      transition: width 220ms ease;
    }

    .card-stage {
      perspective: 1800px;
      margin: 10px 0 14px;
    }

    .card-shell {
      width: 100%;
      height: var(--card-height);
      position: relative;
      cursor: pointer;
      outline: none;
    }

    .flash-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.62s cubic-bezier(.2, .8, .2, 1);
    }

    .flash-card.is-flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 32px;
      padding: clamp(22px, 3vw, 34px);
      padding-right: clamp(26px, 3vw, 38px);
      background:
        linear-gradient(180deg, rgba(255, 254, 250, 0.96), rgba(251, 244, 233, 0.94)),
        linear-gradient(135deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0));
      border: 1px solid rgba(115, 82, 54, 0.13);
      box-shadow: var(--shadow);
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-gutter: stable;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scrollbar-width: auto;
      scrollbar-color: rgba(157, 92, 47, 0.9) rgba(157, 92, 47, 0.12);
    }

    .card-face::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 22px;
      border: 1px solid rgba(149, 108, 73, 0.1);
      pointer-events: none;
    }

    .card-face::after {
      content: "";
      position: absolute;
      top: 26px;
      right: 14px;
      bottom: 26px;
      width: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(157, 92, 47, 0.06), rgba(157, 92, 47, 0.14));
      pointer-events: none;
      opacity: 0.85;
    }

    .card-face::-webkit-scrollbar {
      width: 16px;
    }

    .card-face::-webkit-scrollbar-track {
      background: rgba(157, 92, 47, 0.12);
      border-radius: 999px;
      border: 4px solid rgba(255, 250, 242, 0.96);
    }

    .card-face::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(157, 92, 47, 0.92), rgba(125, 63, 23, 0.92));
      border-radius: 999px;
      border: 3px solid rgba(255, 250, 242, 0.96);
      min-height: 44px;
    }

    .card-face::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(171, 101, 52, 0.96), rgba(125, 63, 23, 0.96));
    }

    .card-back {
      transform: rotateY(180deg);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .deck-badge,
    .mini-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
    }

    .card-heading {
      position: relative;
      z-index: 1;
    }

    .card-title {
      margin: 0;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1.18;
      letter-spacing: 0.04em;
    }

    .card-author {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .context-box,
    .prompt-box,
    .answer-box,
    .full-box {
      position: relative;
      z-index: 1;
      background: rgba(255, 252, 246, 0.82);
      border: 1px solid rgba(111, 82, 50, 0.1);
      border-radius: 22px;
      padding: 18px 20px;
    }

    .context-label,
    .prompt-label,
    .answer-label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .context-text,
    .answer-text {
      margin: 0;
      font-size: clamp(19px, 2.25vw, 27px);
      line-height: 1.8;
      word-break: break-word;
    }

    .context-text.subtle {
      color: var(--muted);
      font-size: clamp(18px, 2vw, 24px);
    }

    .masked-line {
      margin: 0;
      font-size: clamp(30px, 4vw, 50px);
      line-height: 1.55;
      letter-spacing: 0.08em;
      word-break: break-word;
    }

    .tip-text {
      margin: auto 0 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
      position: relative;
      z-index: 1;
    }

    .scroll-cue {
      position: sticky;
      top: 0;
      z-index: 3;
      align-self: flex-end;
      margin: -4px 6px 0 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 248, 239, 0.94);
      border: 1px solid rgba(157, 92, 47, 0.18);
      color: var(--accent-strong);
      font-size: 12px;
      line-height: 1;
      box-shadow: 0 6px 16px rgba(92, 60, 31, 0.1);
      backdrop-filter: blur(10px);
    }

    .context-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .full-box {
      flex: initial;
      overflow: visible;
      padding-right: 0;
    }

    .full-lines {
      display: grid;
      gap: 12px;
    }

    .full-line {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      padding-bottom: 12px;
      border-bottom: 1px dashed rgba(120, 86, 55, 0.12);
    }

    .full-line.is-target {
      margin: 2px 0;
      padding: 14px 14px 14px 0;
      border-radius: 18px;
      border-bottom-color: transparent;
      background: linear-gradient(135deg, rgba(157, 92, 47, 0.14), rgba(209, 144, 88, 0.08));
      box-shadow: inset 0 0 0 1px rgba(157, 92, 47, 0.12);
    }

    .line-no {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(157, 92, 47, 0.1);
      color: var(--accent-strong);
      font-size: 14px;
    }

    .full-line.is-target .line-no {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff7ef;
    }

    .full-line-text {
      margin: 0;
      font-size: clamp(19px, 2vw, 26px);
      line-height: 1.78;
      word-break: break-word;
    }

    .full-line.is-target .full-line-text {
      color: #472a12;
      font-weight: 600;
    }

    .empty-state {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 18px;
    }

    .action-btn,
    .utility-btn {
      padding: 10px 16px;
      min-width: 96px;
      font-size: 14px;
    }

    .action-btn:disabled,
    .utility-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .shortcut-panel {
      padding: 12px 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .shortcut-panel strong {
      color: var(--ink);
      font-weight: 600;
    }

    .footer-note {
      margin-top: 14px;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 960px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .status-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100vw - 18px, 100%);
        padding-top: 18px;
      }

      .hero-card,
      .panel,
      .shortcut-panel {
        border-radius: 22px;
      }

      .card-face {
        border-radius: 26px;
      }

      .context-grid {
        grid-template-columns: 1fr;
      }

      .masked-line {
        font-size: clamp(28px, 7vw, 40px);
      }

      .full-line {
        grid-template-columns: 36px minmax(0, 1fr);
        gap: 10px;
      }

      .actions {
        justify-content: stretch;
      }

      .action-btn,
      .utility-btn {
        flex: 1 1 44%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <section class="hero-card">
        <p class="eyebrow">友松实验室 + 雨来AI</p>
        <h1>高考古诗文默写，拿满分</h1>
        <p class="subtitle">
          系统每次抽考一句，翻面直接核对整篇，并把考查句高亮出来。支持随机、按篇筛选和键盘操作，
          更接近真实默写训练，也更适合反复定位薄弱句。
        </p>
        <div class="hero-meta">
          <span class="hero-chip">整篇 <strong id="summaryPoems">0</strong></span>
          <span class="hero-chip">题卡 <strong id="summaryLines">0</strong></span>
        </div>
      </section>
    </header>

    <section class="panel">
      <div class="controls">
        <label class="control-block">
          <span class="control-label">选择篇目</span>
          <select id="poemSelect" aria-label="选择篇目"></select>
        </label>
        <div class="control-block">
          <span class="control-label">排序方式</span>
          <div class="mode-group">
            <button class="mode-btn" id="sortRandomBtn" type="button">随机排序</button>
            <button class="mode-btn" id="sortOrderedBtn" type="button">按照篇目排序</button>
          </div>
        </div>
      </div>
      <div class="status-row">
        <div>
          <div class="status-text" id="statusText">正在准备卡片…</div>
          <div class="progress-wrap">
            <span class="progress-bar" id="progressBar"></span>
          </div>
        </div>
        <div class="mini-chip" id="modeHint">空格翻卡</div>
      </div>
    </section>

    <div class="card-stage">
      <div class="card-shell" id="cardShell" tabindex="0" role="button" aria-label="点击翻转卡片">
        <div class="flash-card" id="flashCard">
          <section class="card-face card-front" id="frontFace"></section>
          <section class="card-face card-back" id="backFace"></section>
        </div>
      </div>
    </div>

    <section class="actions">
      <button class="action-btn" id="prevBtn" type="button">上一张</button>
      <button class="action-btn primary" id="flipBtn" type="button">翻卡</button>
      <button class="action-btn" id="nextBtn" type="button">下一张</button>
      <button class="action-btn" id="randomBtn" type="button">随机一张</button>
    </section>

    <section class="shortcut-panel">
      <strong>快捷键：</strong>
      `空格` 翻卡，`←` / `→` 切换，`R` 随机一张，`S` 切换排序方式。
    </section>
  </div>

  <script>
    const FULL_DATA = [{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":"子曰：“君子食无求饱，居无求安，敏于事而慎于言，就有道而正焉，可谓好学也已。”(《学而》)子曰：“人而不仁，如礼何？人而不仁，如乐何？”(《八佾》)子曰：“朝闻道，夕死可矣。”(《里仁》)子曰：“君子喻于义，小人喻于利。”(《里仁》)子曰：“见贤思齐焉，见不贤而内自省也。”(《里仁》)子曰：“质胜文则野，文胜质则史。文质彬彬，然后君子。”(《雍也》)曾子曰：“士不可以不弘毅，任重而道远。仁以为己任，不亦重乎？死而后已，不亦远乎？”(《泰伯》)子曰：“譬如为山，未成一篑，止，吾止也。譬如平地，虽覆一篑，进，吾往也。”(《子罕》)子曰：“知者不惑，仁者不忧，勇者不惧。”(《子罕》)颜渊问仁。子曰：“克己复礼为仁。一日克己复礼，天下归仁焉。为仁由己，而由人乎哉？”颜渊曰：“请问其目。”子曰：“非礼勿视，非礼勿听，非礼勿言，非礼勿动。”颜渊曰：“回虽不敏，请事斯语矣。”(《颜渊》)子贡问曰：“有一言而可以终身行之者乎？”子曰：“其‘恕’乎！己所不欲，勿施于人。”(《卫灵公》)子曰：“小子何莫学夫《诗》？《诗》可以兴，可以观，可以群，可以怨。迩之事父，远之事君。多识于鸟兽草木之名。”(《阳货》)"},{"title":"劝学","author":"《荀子》","content":"君子曰：学不可以已。青，取之于蓝，而青于蓝；冰，水为之，而寒于水。木直中绳，𫐓以为轮，其曲中规。虽有槁暴，不复挺者，𫐓使之然也。故木受绳则直，金就砺则利，君子博学而日参省乎己，则知明而行无过矣。吾尝终日而思矣，不如须臾之所学也；吾尝跂而望矣，不如登高之博见也。登高而招，臂非加长也，而见者远；顺风而呼，声非加疾也，而闻者彰。假舆马者，非利足也，而致千里；假舟楫者，非能水也，而绝江河。君子生非异也，善假于物也。积土成山，风雨兴焉；积水成渊，蛟龙生焉；积善成德，而神明自得，圣心备焉。故不积跬步，无以至千里；不积小流，无以成江海。骐骥一跃，不能十步；驽马十驾，功在不舍。锲而舍之，朽木不折；锲而不舍，金石可镂。蚓无爪牙之利，筋骨之强，上食埃土，下饮黄泉，用心一也。蟹六跪而二螯，非蛇鳝之穴无可寄托者，用心躁也。"},{"title":"屈原列传","author":"司马迁","content":"屈平疾王听之不聪也，谗谄之蔽明也，邪曲之害公也，方正之不容也，故忧愁幽思而作《离骚》。“离骚”者，犹离忧也。夫天者，人之始也；父母者，人之本也。人穷则反本，故劳苦倦极，未尝不呼天也；疾痛惨怛，未尝不呼父母也。屈平正道直行，竭忠尽智以事其君，谗人间之，可谓穷矣。信而见疑，忠而被谤，能无怨乎？屈平之作《离骚》，盖自怨生也。《国风》好色而不淫，《小雅》怨诽而不乱。若《离骚》者，可谓兼之矣。上称帝喾，下道齐桓，中述汤、武，以刺世事。明道德之广崇，治乱之条贯，靡不毕见。其文约，其辞微，其志洁，其行廉。其称文小而其指极大，举类迩而见义远。其志洁，故其称物芳；其行廉，故死而不容。自疏濯淖污泥之中，蝉蜕于浊秽，以浮游尘埃之外，不获世之滋垢，皭然泥而不滓者也。推此志也，虽与日月争光可也。"},{"title":"谏太宗十思疏","author":"魏征","content":"臣闻求木之长者，必固其根本；欲流之远者，必浚其泉源；思国之安者，必积其德义。源不深而望流之远，根不固而求木之长，德不厚而思国之理，臣虽下愚，知其不可，而况于明哲乎！人君当神器之重，居域中之大，将崇极天之峻，永保无疆之休。不念居安思危，戒奢以俭，德不处其厚，情不胜其欲，斯亦伐根以求木茂，塞源而欲流长者也。凡百元首，承天景命，莫不殷忧而道著，功成而德衰。有善始者实繁，能克终者盖寡。岂取之易而守之难乎？昔取之而有余，今守之而不足，何也？夫在殷忧，必竭诚以待下；既得志，则纵情以傲物。竭诚则胡越为一体，傲物则骨肉为行路。虽董之以严刑，振之以威怒，终苟免而不怀仁，貌恭而不心服。怨不在大，可畏惟人；载舟覆舟，所宜深慎；奔车朽索，其可忽乎！君人者，诚能见可欲则思知足以自戒，将有作则思知止以安人，念高危则思谦冲而自牧，惧满溢则思江海下百川，乐盘游则思三驱以为度，忧懈怠则思慎始而敬终，虑壅蔽则思虚心以纳下，想谗邪则思正身以黜恶，恩所加则思无因喜以谬赏，罚所及则思无因怒而滥刑。总此十思，弘兹九德，简能而任之，择善而从之，则智者尽其谋，勇者竭其力，仁者播其惠，信者效其忠。文武争驰，在君无事，可以尽豫游之乐，可以养松、乔之寿，鸣琴垂拱，不言而化。何必劳神苦思，代下司职，役聪明之耳目，亏无为之大道哉！"},{"title":"师说","author":"韩愈","content":"古之学者必有师。师者，所以传道受业解惑也。人非生而知之者，孰能无惑？惑而不从师，其为惑也，终不解矣。生乎吾前，其闻道也固先乎吾，吾从而师之；生乎吾后，其闻道也亦先乎吾，吾从而师之。吾师道也，夫庸知其年之先后生于吾乎？是故无贵无贱，无长无少，道之所存，师之所存也。嗟乎！师道之不传也久矣！欲人之无惑也难矣！古之圣人，其出人也远矣，犹且从师而问焉；今之众人，其下圣人也亦远矣，而耻学于师。是故圣益圣，愚益愚。圣人之所以为圣，愚人之所以为愚，其皆出于此乎？爱其子，择师而教之；于其身也，则耻师焉，惑矣。彼童子之师，授之书而习其句读者，非吾所谓传其道解其惑者也。句读之不知，惑之不解，或师焉，或不焉，小学而大遗，吾未见其明也。巫医乐师百工之人，不耻相师。士大夫之族，曰师曰弟子云者，则群聚而笑之。问之，则曰：“彼与彼年相若也，道相似也，位卑则足羞，官盛则近谀。”呜呼！师道之不复，可知矣。巫医乐师百工之人，君子不齿，今其智乃反不能及，其可怪也欤！圣人无常师。孔子师郯子、苌弘、师襄、老聃。郯子之徒，其贤不及孔子。孔子曰：三人行，则必有我师。是故弟子不必不如师，师不必贤于弟子，闻道有先后，术业有专攻，如是而已。李氏子蟠，年十七，好古文，六艺经传皆通习之，不拘于时，学于余。余嘉其能行古道，作《师说》以贻之。"},{"title":"阿房宫赋","author":"杜牧","content":"六王毕，四海一，蜀山兀，阿房出。覆压三百余里，隔离天日。骊山北构而西折，直走咸阳。二川溶溶，流入宫墙。五步一楼，十步一阁；廊腰缦回，檐牙高啄；各抱地势，钩心斗角。盘盘焉，囷囷焉，蜂房水涡，矗不知其几千万落。长桥卧波，未云何龙？复道行空，不霁何虹？高低冥迷，不知西东。歌台暖响，春光融融；舞殿冷袖，风雨凄凄。一日之内，一宫之间，而气候不齐。妃嫔媵嫱，王子皇孙，辞楼下殿，辇来于秦。朝歌夜弦，为秦宫人。明星荧荧，开妆镜也；绿云扰扰，梳晓鬟也；渭流涨腻，弃脂水也；烟斜雾横，焚椒兰也。雷霆乍惊，宫车过也；辘辘远听，杳不知其所之也。一肌一容，尽态极妍，缦立远视，而望幸焉。有不见者，三十六年。燕赵之收藏，韩魏之经营，齐楚之精英，几世几年，剽掠其人，倚叠如山。一旦不能有，输来其间。鼎铛玉石，金块珠砾，弃掷逦迤，秦人视之，亦不甚惜。嗟乎！一人之心，千万人之心也。秦爱纷奢，人亦念其家。奈何取之尽锱铢，用之如泥沙？使负栋之柱，多于南亩之农夫；架梁之椽，多于机上之工女；钉头磷磷，多于在庾之粟粒；瓦缝参差，多于周身之帛缕；直栏横槛，多于九土之城郭；管弦呕哑，多于市人之言语。使天下之人，不敢言而敢怒。独夫之心，日益骄固。戍卒叫，函谷举，楚人一炬，可怜焦土！呜呼！灭六国者六国也，非秦也；族秦者秦也，非天下也。嗟乎！使六国各爱其人，则足以拒秦；使秦复爱六国之人，则递三世可至万世而为君，谁得而族灭也？秦人不暇自哀，而后人哀之；后人哀之而不鉴之，亦使后人而复哀后人也。"},{"title":"六国论","author":"苏洵","content":"六国破灭，非兵不利，战不善，弊在赂秦。赂秦而力亏，破灭之道也。或曰：六国互丧，率赂秦耶？曰：不赂者以赂者丧。盖失强援，不能独完。故曰：弊在赂秦也。秦以攻取之外，小则获邑，大则得城。较秦之所得，与战胜而得者，其实百倍；诸侯之所亡，与战败而亡者，其实亦百倍。则秦之所大欲，诸侯之所大患，固不在战矣。思厥先祖父，暴霜露，斩荆棘，以有尺寸之地。子孙视之不甚惜，举以予人，如弃草芥。今日割五城，明日割十城，然后得一夕安寝。起视四境，而秦兵又至矣。然则诸侯之地有限，暴秦之欲无厌，奉之弥繁，侵之愈急。故不战而强弱胜负已判矣。至于颠覆，理固宜然。古人云：“以地事秦，犹抱薪救火，薪不尽，火不灭。”此言得之。齐人未尝赂秦，终继五国迁灭，何哉？与嬴而不助五国也。五国既丧，齐亦不免矣。燕赵之君，始有远略，能守其土，义不赂秦。是故燕虽小国而后亡，斯用兵之效也。至丹以荆卿为计，始速祸焉。赵尝五战于秦，二败而三胜。后秦击赵者再，李牧连却之。洎牧以谗诛，邯郸为郡，惜其用武而不终也。且燕赵处秦革灭殆尽之际，可谓智力孤危，战败而亡，诚不得已。向使三国各爱其地，齐人勿附于秦，刺客不行，良将犹在，则胜负之数，存亡之理，当与秦相较，或未易量。呜呼！以赂秦之地封天下之谋臣，以事秦之心礼天下之奇才，并力西向，则吾恐秦人食之不得下咽也。悲夫！有如此之势，而为秦人积威之所劫，日削月割，以趋于亡。为国者无使为积威之所劫哉！夫六国与秦皆诸侯，其势弱于秦，而犹有可以不赂而胜之之势。苟以天下之大，下而从六国破亡之故事，是又在六国下矣。"},{"title":"答司马谏议书","author":"王安石","content":"某启：昨日蒙教，窃以为与君实游处相好之日久，而议事每不合，所操之术多异故也。虽欲强聒，终必不蒙见察，故略上报，不复一一自辨。重念蒙君实视遇厚，于反覆不宜卤莽，故今具道所以，冀君实或见恕也。盖儒者所争，尤在于名实，名实已明，而天下之理得矣。今君实所以见教者，以为侵官、生事、征利、拒谏，以致天下怨谤也。某则以谓受命于人主，议法度而修之于朝廷，以授之于有司，不为侵官；举先王之政，以兴利除弊，不为生事；为天下理财，不为征利；辟邪说，难壬人，不为拒谏。至于怨诽之多，则固前知其如此也。人习于苟且非一日，士大夫多以不恤国事、同俗自媚于众为善，上乃欲变此，而某不量敌之众寡，欲出力助上以抗之，则众何为而不汹汹然？盘庚之迁，胥怨者民也，非特朝廷士大夫而已；盘庚不为怨者故改其度，度义而后动，是而不见可悔故也。如君实责我以在位久，未能助上大有为，以膏泽斯民，则某知罪矣；如曰今日当一切不事事，守前所为而已，则非某之所敢知。无由会晤，不任区区向往之至！"},{"title":"赤壁赋","author":"苏轼","content":"壬戌之秋，七月既望，苏子与客泛舟游于赤壁之下。清风徐来，水波不兴。举酒属客，诵明月之诗，歌窈窕之章。少焉，月出于东山之上，徘徊于斗牛之间。白露横江，水光接天。纵一苇之所如，凌万顷之茫然。浩浩乎如冯虚御风，而不知其所止；飘飘乎如遗世独立，羽化而登仙。于是饮酒乐甚，扣舷而歌之。歌曰：“桂棹兮兰桨，击空明兮溯流光。渺渺兮予怀，望美人兮天一方。”客有吹洞箫者，倚歌而和之。其声呜呜然，如怨如慕，如泣如诉；余音袅袅，不绝如缕。舞幽壑之潜蛟，泣孤舟之嫠妇。苏子愀然，正襟危坐而问客曰：“何为其然也？”客曰：“‘月明星稀，乌鹊南飞’，此非曹孟德之诗乎？西望夏口，东望武昌，山川相缪，郁乎苍苍，此非孟德之困于周郎者乎？方其破荆州，下江陵，顺流而东也，舳舻千里，旌旗蔽空，酾酒临江，横槊赋诗，固一世之雄也，而今安在哉？况吾与子渔樵于江渚之上，侣鱼虾而友麋鹿，驾一叶之扁舟，举匏樽以相属。寄蜉蝣于天地，渺沧海之一粟。哀吾生之须臾，羡长江之无穷。挟飞仙以遨游，抱明月而长终。知不可乎骤得，托遗响于悲风。”苏子曰：“客亦知夫水与月乎？逝者如斯，而未尝往也；盈虚者如彼，而卒莫消长也。盖将自其变者而观之，则天地曾不能以一瞬；自其不变者而观之，则物与我皆无尽也，而又何羡乎！且夫天地之间，物各有主，苟非吾之所有，虽一毫而莫取。惟江上之清风，与山间之明月，耳得之而为声，目遇之而成色，取之无禁，用之不竭，是造物者之无尽藏也，而吾与子之所共适。”客喜而笑，洗盏更酌。肴核既尽，杯盘狼籍。相与枕藉乎舟中，不知东方之既白。"},{"title":"项脊轩志","author":"归有光","content":"项脊轩，旧南阁子也。室仅方丈，可容一人居。百年老屋，尘泥渗漉，雨泽下注；每移案，顾视无可置者。又北向，不能得日，日过午已昏。余稍为修葺，使不上漏。前辟四窗，垣墙周庭，以当南日，日影反照，室始洞然。又杂植兰桂竹木于庭，旧时栏楯，亦遂增胜。借书满架，偃仰啸歌，冥然兀坐，万籁有声；而庭阶寂寂，小鸟时来啄食，人至不去。三五之夜，明月半墙，桂影斑驳，风移影动，珊珊可爱。然余居于此，多可喜，亦多可悲。先是庭中通南北为一。迨诸父异爨，内外多置小门墙，往往而是，东犬西吠，客逾庖而宴，鸡栖于厅。庭中始为篱，已为墙，凡再变矣。家有老妪，尝居于此。妪，先大母婢也，乳二世，先妣抚之甚厚。室西连于中闺，先妣尝一至。妪每谓余曰：“某所，而母立于兹。”妪又曰：“汝姊在吾怀，呱呱而泣；娘以指叩门扉曰：‘儿寒乎？欲食乎？’吾从板外相为应答。”语未毕，余泣，妪亦泣。余自束发读书轩中，一日，大母过余曰：“吾儿，久不见若影，何竟日默默在此，大类女郎也？”比去，以手阖门，自语曰：“吾家读书久不效，儿之成，则可待乎！”顷之，持一象笏至，曰：“此吾祖太常公宣德间执此以朝，他日汝当用之！”瞻顾遗迹，如在昨日，令人长号不自禁。轩东故尝为厨，人往，从轩前过。余扃牖而居，久之，能以足音辨人。轩凡四遭火，得不焚，殆有神护者。…………余既为此志，后五年，吾妻来归，时至轩中，从余问古事，或凭几学书。吾妻归宁，述诸小妹语曰：“闻姊家有阁子，且何谓阁子也？”其后六年，吾妻死，室坏不修。其后二年，余久卧病无聊，乃使人复葺南阁子，其制稍异于前。然自后余多在外，不常居。庭有枇杷树，吾妻死之年所手植也，今已亭亭如盖矣。"},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":"子路、曾皙、冉有、公西华侍坐。子曰：“以吾一日长乎尔，毋吾以也。居则曰：‘不吾知也。’如或知尔，则何以哉？”子路率尔而对曰：“千乘之国，摄乎大国之间，加之以师旅，因之以饥馑；由也为之，比及三年，可使有勇，且知方也。”夫子哂之。“求！尔何如？”对曰：“方六七十，如五六十，求也为之，比及三年，可使足民。如其礼乐，以俟君子。”“赤！尔何如？”对曰：“非曰能之，愿学焉。宗庙之事，如会同，端章甫，愿为小相焉。”“点！尔何如？”鼓瑟希，铿尔，舍瑟而作，对曰：“异乎三子者之撰。”子曰：“何伤乎？亦各言其志也。”曰：“莫春者，春服既成，冠者五六人，童子六七人，浴乎沂，风乎舞雩，咏而归。”夫子喟然叹曰：“吾与点也！”三子者出，曾皙后。曾皙曰：“夫三子者之言何如？”子曰：“亦各言其志也已矣。”曰：“夫子何哂由也？”曰：“为国以礼，其言不让，是故哂之。”“唯求则非邦也与？”“安见方六七十如五六十而非邦也者？”“唯赤则非邦也与？”“宗庙会同，非诸侯而何？赤也为之小，孰能为之大？”"},{"title":"报任安书","author":"司马迁","content":"古者富贵而名摩灭，不可胜记，唯倜傥非常之人称焉。盖文王拘而演《周易》；仲尼厄而作《春秋》；屈原放逐，乃赋《离骚》；左丘失明，厥有《国语》；孙子膑脚，《兵法》修列；不韦迁蜀，世传《吕览》；韩非囚秦，《说难》《孤愤》；《诗》三百篇，大底圣贤发愤之所为作也。此人皆意有所郁结，不得通其道，故述往事，思来者。乃如左丘无目，孙子断足，终不可用，退而论书策，以舒其愤，思垂空文以自见。仆窃不逊，近自托于无能之辞，网罗天下放失旧闻，略考其行事，综其终始，稽其成败兴坏之纪，上计轩辕，下至于兹，为十表，本纪十二，书八章，世家三十，列传七十，凡百三十篇。亦欲以究天人之际，通古今之变，成一家之言。草创未就，会遭此祸，惜其不成，是以就极刑而无愠色。仆诚以著此书，藏之名山，传之其人，通邑大都，则仆偿前辱之责，虽万被戮，岂有悔哉！然此可为智者道，难为俗人言也。"},{"title":"过秦论（上）","author":"贾谊","content":"秦孝公据崤函之固，拥雍州之地，君臣固守以窥周室，有席卷天下，包举宇内，囊括四海之意，并吞八荒之心。当是时也，商君佐之，内立法度，务耕织，修守战之具；外连衡而斗诸侯。于是秦人拱手而取西河之外。孝公既没，惠文、武、昭襄蒙故业，因遗策，南取汉中，西举巴、蜀，东割膏腴之地，北收要害之郡。诸侯恐惧，会盟而谋弱秦，不爱珍器重宝肥饶之地，以致天下之士，合从缔交，相与为一。当此之时，齐有孟尝，赵有平原，楚有春申，魏有信陵。此四君者，皆明智而忠信，宽厚而爱人，尊贤而重士，约从离衡，兼韩、魏、燕、楚、齐、赵、宋、卫、中山之众。于是六国之士，有甯越、徐尚、苏秦、杜赫之属为之谋，齐明、周最、陈轸、召滑、楼缓、翟景、苏厉、乐毅之徒通其意，吴起、孙膑、带佗、倪良、王廖、田忌、廉颇、赵奢之伦制其兵。尝以十倍之地，百万之众，叩关而攻秦。秦人开关延敌，九国之师，逡巡而不敢进。秦无亡矢遗镞之费，而天下诸侯已困矣。于是从散约败，争割地而赂秦。秦有余力而制其弊，追亡逐北，伏尸百万，流血漂橹。因利乘便，宰割天下，分裂山河。强国请服，弱国入朝。延及孝文王、庄襄王，享国之日浅，国家无事。及至始皇，奋六世之余烈，振长策而御宇内，吞二周而亡诸侯，履至尊而制六合，执敲扑而鞭笞天下，威振四海。南取百越之地，以为桂林、象郡；百越之君，俯首系颈，委命下吏。乃使蒙恬北筑长城而守藩篱，却匈奴七百余里；胡人不敢南下而牧马，士不敢弯弓而报怨。于是废先王之道，焚百家之言，以愚黔首；隳名城，杀豪杰；收天下之兵，聚之咸阳，销锋镝，铸以为金人十二，以弱天下之民。然后践华为城，因河为池，据亿丈之城，临不测之渊，以为固。良将劲弩守要害之处，信臣精卒陈利兵而谁何。天下已定，始皇之心，自以为关中之固，金城千里，子孙帝王万世之业也。始皇既没，余威震于殊俗。然陈涉瓮牖绳枢之子，氓隶之人，而迁徙之徒也；才能不及中人，非有仲尼、墨翟之贤，陶朱、猗顿之富；蹑足行伍之间，而倔起阡陌之中，率疲弊之卒，将数百之众，转而攻秦；斩木为兵，揭竿为旗，天下云集响应，赢粮而景从。山东豪俊遂并起而亡秦族矣。且夫天下非小弱也，雍州之地，崤函之固，自若也。陈涉之位，非尊于齐、楚、燕、赵、韩、魏、宋、卫、中山之君也；锄櫌棘矜，非铦于钩戟长铩也；谪戍之众，非抗于九国之师也；深谋远虑，行军用兵之道，非及乡时之士也。然而成败异变，功业相反，何也？试使山东之国与陈涉度长絜大，比权量力，则不可同年而语矣。然秦以区区之地，致万乘之势，序八州而朝同列，百有余年矣；然后以六合为家，崤函为宫；一夫作难而七庙隳，身死人手，为天下笑者，何也？仁义不施而攻守之势异也。"},{"title":"礼运","author":"《礼记》","content":"大道之行也，天下为公。选贤与能，讲信修睦。故人不独亲其亲，不独子其子，使老有所终，壮有所用，幼有所长，矜、寡、孤、独、废疾者皆有所养，男有分，女有归。货恶其弃于地也，不必藏于己；力恶其不出于身也，不必为己。是故谋闭而不兴，盗窃乱贼而不作，故外户而不闭。是谓大同。"},{"title":"陈情表","author":"李密","content":"臣密言：臣以险衅，夙遭闵凶。生孩六月，慈父见背；行年四岁，舅夺母志。祖母刘愍臣孤弱，躬亲抚养。臣少多疾病，九岁不行，零丁孤苦，至于成立。既无伯叔，终鲜兄弟，门衰祚薄，晚有儿息。外无期功强近之亲，内无应门五尺之僮，茕茕孑立，形影相吊。而刘夙婴疾病，常在床蓐，臣侍汤药，未曾废离。逮奉圣朝，沐浴清化。前太守臣逵察臣孝廉，后刺史臣荣举臣秀才。臣以供养无主，辞不赴命。诏书特下，拜臣郎中，寻蒙国恩，除臣洗马。猥以微贱，当侍东宫，非臣陨首所能上报。臣具以表闻，辞不就职。诏书切峻，责臣逋慢；郡县逼迫，催臣上道；州司临门，急于星火。臣欲奉诏奔驰，则刘病日笃；欲苟顺私情，则告诉不许：臣之进退，实为狼狈。伏惟圣朝以孝治天下，凡在故老，犹蒙矜育，况臣孤苦，特为尤甚。且臣少仕伪朝，历职郎署，本图宦达，不矜名节。今臣亡国贱俘，至微至陋，过蒙拔擢，宠命优渥，岂敢盘桓，有所希冀。但以刘日薄西山，气息奄奄，人命危浅，朝不虑夕。臣无祖母，无以至今日；祖母无臣，无以终余年。母、孙二人，更相为命，是以区区不能废远。臣密今年四十有四，祖母今年九十有六，是臣尽节于陛下之日长，报养刘之日短也。乌鸟私情，愿乞终养。臣之辛苦，非独蜀之人士及二州牧伯所见明知，皇天后土实所共鉴。愿陛下矜愍愚诚，听臣微志，庶刘侥幸，保卒余年。臣生当陨首，死当结草。臣不胜犬马怖惧之情，谨拜表以闻。"},{"title":"归去来兮辞","author":"陶潜","content":"归去来兮，田园将芜胡不归？既自以心为形役，奚惆怅而独悲？悟已往之不谏，知来者之可追。实迷途其未远，觉今是而昨非。舟遥遥以轻飏，风飘飘而吹衣。问征夫以前路，恨晨光之熹微。乃瞻衡宇，载欣载奔。僮仆欢迎，稚子候门。三径就荒，松菊犹存。携幼入室，有酒盈樽。引壶觞以自酌，眄庭柯以怡颜。倚南窗以寄傲，审容膝之易安。园日涉以成趣，门虽设而常关。策扶老以流憩，时矫首而遐观。云无心以出岫，鸟倦飞而知还。景翳翳以将入，抚孤松而盘桓。归去来兮，请息交以绝游。世与我而相违，复驾言兮焉求？悦亲戚之情话，乐琴书以消忧。农人告余以春及，将有事于西畴。或命巾车，或棹孤舟。既窈窕以寻壑，亦崎岖而经丘。木欣欣以向荣，泉涓涓而始流。善万物之得时，感吾生之行休。已矣乎！寓形宇内复几时？曷不委心任去留？胡为乎遑遑欲何之？富贵非吾愿，帝乡不可期。怀良辰以孤往，或植杖而耘耔。登东皋以舒啸，临清流而赋诗。聊乘化以归尽，乐夫天命复奚疑！"},{"title":"种树郭橐驼传","author":"柳宗元","content":"郭橐驼，不知始何名。病偻，隆然伏行，有类橐驼者，故乡人号之“驼”。驼闻之曰：“甚善。名我固当。”因舍其名，亦自谓“橐驼”云。其乡曰丰乐乡，在长安西。驼业种树，凡长安豪富人为观游及卖果者，皆争迎取养。视驼所种树，或移徙，无不活；且硕茂，早实以蕃。他植者虽窥伺效慕，莫能如也。有问之，对曰：“橐驼非能使木寿且孳也，能顺木之天，以致其性焉尔。凡植木之性，其本欲舒，其培欲平，其土欲故，其筑欲密。既然已，勿动勿虑，去不复顾。其莳也若子，其置也若弃，则其天者全而其性得矣。故吾不害其长而已，非有能硕茂之也；不抑耗其实而已，非有能早而蕃之也。他植者则不然。根拳而土易，其培之也，若不过焉则不及。苟有能反是者，则又爱之太恩，忧之太勤。旦视而暮抚，已去而复顾。甚者，爪其肤以验其生枯，摇其本以观其疏密，而木之性日以离矣。虽曰爱之，其实害之；虽曰忧之，其实仇之；故不我若也。吾又何能为哉！”问者曰：“以子之道，移之官理，可乎？”驼曰：“我知种树而已，理，非吾业也。然吾居乡，见长人者好烦其令，若甚怜焉，而卒以祸。旦暮吏来而呼曰：‘官命促尔耕，勖尔植，督尔获，早缫而绪，早织而缕，字而幼孩，遂而鸡豚。’鸣鼓而聚之，击木而召之。吾小人辍飧饔以劳吏者，且不得暇，又何以蕃吾生而安吾性耶？故病且怠。若是，则与吾业者其亦有类乎？”问者曰：“嘻，不亦善夫！吾问养树，得养人术。”传其事以为官戒也。"},{"title":"五代史伶官传序","author":"欧阳修","content":"呜呼！盛衰之理，虽曰天命，岂非人事哉！原庄宗之所以得天下，与其所以失之者，可以知之矣。世言晋王之将终也，以三矢赐庄宗而告之曰：“梁，吾仇也；燕王吾所立，契丹与吾约为兄弟，而皆背晋以归梁。此三者，吾遗恨也。与尔三矢，尔其无忘乃父之志！”庄宗受而藏之于庙。其后用兵，则遣从事以一少牢告庙，请其矢，盛以锦囊，负而前驱，及凯旋而纳之。方其系燕父子以组，函梁君臣之首，入于太庙，还矢先王，而告以成功，其意气之盛，可谓壮哉！及仇雠已灭，天下已定，一夫夜呼，乱者四应，仓皇东出，未及见贼而士卒离散，君臣相顾，不知所归，至于誓天断发，泣下沾襟，何其衰也！岂得之难而失之易欤？抑本其成败之迹，而皆自于人欤？《书》曰：“满招损，谦得益。”忧劳可以兴国，逸豫可以亡身，自然之理也。故方其盛也，举天下之豪杰，莫能与之争；及其衰也，数十伶人困之，而身死国灭，为天下笑。夫祸患常积于忽微，而智勇多困于所溺，岂独伶人也哉？"},{"title":"石钟山记","author":"苏轼","content":"《水经》云：“彭蠡之口有石钟山焉。”郦元以为下临深潭，微风鼓浪，水石相搏，声如洪钟。是说也，人常疑之。今以钟磬置水中，虽大风浪不能鸣也，而况石乎！至唐李渤始访其遗踪，得双石于潭上，扣而聆之，南声函胡，北音清越，桴止响腾，余韵徐歇。自以为得之矣。然是说也，余尤疑之。石之铿然有声者，所在皆是也，而此独以钟名，何哉？元丰七年六月丁丑，余自齐安舟行适临汝，而长子迈将赴饶之德兴尉，送之至湖口，因得观所谓石钟者。寺僧使小童持斧，于乱石间择其一二扣之，硿硿焉。余固笑而不信也。至暮夜月明，独与迈乘小舟，至绝壁下。大石侧立千尺，如猛兽奇鬼，森然欲搏人；而山上栖鹘，闻人声亦惊起，磔磔云霄间；又有若老人咳且笑于山谷中者，或曰此鹳鹤也。余方心动欲还，而大声发于水上，噌吰如钟鼓不绝。舟人大恐。徐而察之，则山下皆石穴罅，不知其浅深，微波入焉，涵澹澎湃而为此也。舟回至两山间，将入港口，有大石当中流，可坐百人，空中而多窍，与风水相吞吐，有窾坎镗鞳之声，与向之噌吰者相应，如乐作焉。因笑谓迈曰：“汝识之乎？噌吰者，周景王之无射也；窾坎镗鞳者，魏庄子之歌钟也。古之人不余欺也！”事不目见耳闻，而臆断其有无，可乎？郦元之所见闻，殆与余同，而言之不详；士大夫终不肯以小舟夜泊绝壁之下，故莫能知；而渔工水师虽知而不能言。此世所以不传也。而陋者乃以斧斤考击而求之，自以为得其实。余是以记之，盖叹郦元之简，而笑李渤之陋也。"},{"title":"登泰山记","author":"姚鼐","content":"泰山之阳，汶水西流；其阴，济水东流。阳谷皆入汶，阴谷皆入济。当其南北分者，古长城也。最高日观峰，在长城南十五里。余以乾隆三十九年十二月，自京师乘风雪，历齐河、长清，穿泰山西北谷，越长城之限，至于泰安。是月丁未，与知府朱孝纯子颍由南麓登。四十五里，道皆砌石为磴，其级七千有余。泰山正南面有三谷。中谷绕泰安城下，郦道元所谓环水也。余始循以入，道少半，越中岭，复循西谷，遂至其巅。古时登山，循东谷入，道有天门。东谷者，古谓之天门溪水，余所不至也。今所经中岭及山巅，崖限当道者，世皆谓之天门云。道中迷雾冰滑，磴几不可登。及既上，苍山负雪，明烛天南。望晚日照城郭，汶水、徂徕如画，而半山居雾若带然。戊申晦，五鼓，与子颍坐日观亭，待日出。大风扬积雪击面。亭东自足下皆云漫。稍见云中白若樗蒱数十立者，山也。极天云一线异色，须臾成五采。日上，正赤如丹，下有红光动摇承之。或曰，此东海也。回视日观以西峰，或得日或否，绛皓驳色，而皆若偻。亭西有岱祠，又有碧霞元君祠。皇帝行宫在碧霞元君祠东。是日观道中石刻，自唐显庆以来；其远古刻尽漫失。僻不当道者，皆不及往。山多石，少土。石苍黑色，多平方，少圜。少杂树，多松，生石罅，皆平顶。冰雪，无瀑水，无鸟兽音迹。至日观数里内无树，而雪与人膝齐。桐城姚鼐记。"},{"title":"静女","author":"《诗经·邶风》","content":"静女其姝，俟我于城隅。爱而不见，搔首踟蹰。静女其娈，贻我彤管。彤管有炜，说怿女美。自牧归荑，洵美且异。匪女之为美，美人之贻。"},{"title":"无衣","author":"《诗经·秦风》","content":"岂曰无衣？与子同袍。王于兴师，修我戈矛，与子同仇。岂曰无衣？与子同泽。王于兴师，修我矛戟，与子偕作。岂曰无衣？与子同裳。王于兴师，修我甲兵，与子偕行。"},{"title":"离骚","author":"屈原","content":"帝高阳之苗裔兮，朕皇考曰伯庸。摄提贞于孟陬兮，惟庚寅吾以降。皇览揆余初度兮，肇锡余以嘉名。名余曰正则兮，字余曰灵均。纷吾既有此内美兮，又重之以修能。扈江离与辟芷兮，纫秋兰以为佩。汩余若将不及兮，恐年岁之不吾与。朝搴阰之木兰兮，夕揽洲之宿莽。日月忽其不淹兮，春与秋其代序。惟草木之零落兮，恐美人之迟暮。不抚壮而弃秽兮，何不改此度？乘骐骥以驰骋兮，来吾道夫先路！"},{"title":"涉江采芙蓉","author":"《古诗十九首》","content":"涉江采芙蓉，兰泽多芳草。采之欲遗谁？所思在远道。还顾望旧乡，长路漫浩浩。同心而离居，忧伤以终老。"},{"title":"短歌行","author":"曹操","content":"对酒当歌，人生几何！譬如朝露，去日苦多。慨当以慷，忧思难忘。何以解忧？唯有杜康。青青子衿，悠悠我心。但为君故，沉吟至今。呦呦鹿鸣，食野之苹。我有嘉宾，鼓瑟吹笙。明明如月，何时可掇？忧从中来，不可断绝。越陌度阡，枉用相存。契阔谈讌，心念旧恩。月明星稀，乌鹊南飞。绕树三匝，何枝可依？山不厌高，海不厌深。周公吐哺，天下归心。"},{"title":"归园田居（其一）","author":"陶潜","content":"少无适俗韵，性本爱丘山。误落尘网中，一去三十年。羁鸟恋旧林，池鱼思故渊。开荒南野际，守拙归园田。方宅十余亩，草屋八九间。榆柳荫后檐，桃李罗堂前。暧暧远人村，依依墟里烟。狗吠深巷中，鸡鸣桑树颠。户庭无尘杂，虚室有余闲。久在樊笼里，复得返自然。"},{"title":"拟行路难（其四）","author":"鲍照","content":"泻水置平地，各自东西南北流。人生亦有命，安能行叹复坐愁！酌酒以自宽，举杯断绝歌《路难》。心非木石岂无感？吞声踯躅不敢言。"},{"title":"春江花月夜","author":"张若虚","content":"春江潮水连海平，海上明月共潮生。滟滟随波千万里，何处春江无月明。江流宛转绕芳甸，月照花林皆似霰。空里流霜不觉飞，汀上白沙看不见。江天一色无纤尘，皎皎空中孤月轮。江畔何人初见月？江月何年初照人？人生代代无穷已，江月年年望相似。不知江月待何人，但见长江送流水。白云一片去悠悠，青枫浦上不胜愁。谁家今夜扁舟子？何处相思明月楼？可怜楼上月裴回，应照离人妆镜台。玉户帘中卷不去，捣衣砧上拂还来。此时相望不相闻，愿逐月华流照君。鸿雁长飞光不度，鱼龙潜跃水成文。昨夜闲潭梦落花，可怜春半不还家。江水流春去欲尽，江潭落月复西斜。斜月沉沉藏海雾，碣石潇湘无限路。不知乘月几人归，落月摇情满江树。"},{"title":"山居秋暝","author":"王维","content":"空山新雨后，天气晚来秋。明月松间照，清泉石上流。竹喧归浣女，莲动下渔舟。随意春芳歇，王孙自可留。"},{"title":"蜀道难","author":"李白","content":"噫吁嚱，危乎高哉！蜀道之难，难于上青天！蚕丛及鱼凫，开国何茫然！尔来四万八千岁，不与秦塞通人烟。西当太白有鸟道，可以横绝峨眉巅。地崩山摧壮士死，然后天梯石栈相钩连。上有六龙回日之高标，下有冲波逆折之回川。黄鹤之飞尚不得过，猿猱欲度愁攀援。青泥何盘盘，百步九折萦岩峦。扪参历井仰胁息，以手抚膺坐长叹。问君西游何时还？畏途巉岩不可攀。但见悲鸟号古木，雄飞雌从绕林间。又闻子规啼夜月，愁空山。蜀道之难，难于上青天，使人听此凋朱颜！连峰去天不盈尺，枯松倒挂倚绝壁。飞湍瀑流争喧豗，砯崖转石万壑雷。其险也如此，嗟尔远道之人胡为乎来哉！剑阁峥嵘而崔嵬，一夫当关，万夫莫开。所守或匪亲，化为狼与豺。朝避猛虎，夕避长蛇，磨牙吮血，杀人如麻。锦城虽云乐，不如早还家。蜀道之难，难于上青天，侧身西望长咨嗟！"},{"title":"梦游天姥吟留别","author":"李白","content":"海客谈瀛洲，烟涛微茫信难求；越人语天姥，云霞明灭或可睹。天姥连天向天横，势拔五岳掩赤城。天台四万八千丈，对此欲倒东南倾。我欲因之梦吴越，一夜飞度镜湖月。湖月照我影，送我至剡溪。谢公宿处今尚在，渌水荡漾清猿啼。脚著谢公屐，身登青云梯。半壁见海日，空中闻天鸡。千岩万转路不定，迷花倚石忽已暝。熊咆龙吟殷岩泉，栗深林兮惊层巅。云青青兮欲雨，水澹澹兮生烟。列缺霹雳，丘峦崩摧。洞天石扉，訇然中开。青冥浩荡不见底，日月照耀金银台。霓为衣兮风为马，云之君兮纷纷而来下。虎鼓瑟兮鸾回车，仙之人兮列如麻。忽魂悸以魄动，恍惊起而长嗟。惟觉时之枕席，失向来之烟霞。世间行乐亦如此，古来万事东流水。别君去兮何时还？且放白鹿青崖间，须行即骑访名山。安能摧眉折腰事权贵，使我不得开心颜！"},{"title":"将进酒","author":"李白","content":"君不见黄河之水天上来，奔流到海不复回。君不见高堂明镜悲白发，朝如青丝暮成雪。人生得意须尽欢，莫使金樽空对月。天生我材必有用，千金散尽还复来。烹羊宰牛且为乐，会须一饮三百杯。岑夫子，丹丘生，将进酒，杯莫停。与君歌一曲，请君为我倾耳听。钟鼓馔玉不足贵，但愿长醉不愿醒。古来圣贤皆寂寞，惟有饮者留其名。陈王昔时宴平乐，斗酒十千恣欢谑。主人何为言少钱，径须沽取对君酌。五花马、千金裘，呼儿将出换美酒，与尔同销万古愁。"},{"title":"燕歌行","author":"高适","content":"汉家烟尘在东北，汉将辞家破残贼。男儿本自重横行，天子非常赐颜色。𪭢金伐鼓下榆关，旌旆逶迤碣石间。校尉羽书飞瀚海，单于猎火照狼山。山川萧条极边土，胡骑凭陵杂风雨。战士军前半死生，美人帐下犹歌舞。大漠穷秋塞草腓，孤城落日斗兵稀。身当恩遇常轻敌，力尽关山未解围。铁衣远戍辛勤久，玉箸应啼别离后。少妇城南欲断肠，征人蓟北空回首。边庭飘飖那可度，绝域苍茫无所有。杀气三时作阵云，寒声一夜传刁斗。相看白刃血纷纷，死节从来岂顾勋！君不见沙场征战苦，至今犹忆李将军。"},{"title":"蜀相","author":"杜甫","content":"丞相祠堂何处寻？锦官城外柏森森。映阶碧草自春色，隔叶黄鹂空好音。三顾频烦天下计，两朝开济老臣心。出师未捷身先死，长使英雄泪满襟。"},{"title":"客至","author":"杜甫","content":"舍南舍北皆春水，但见群鸥日日来。花径不曾缘客扫，蓬门今始为君开。盘飧市远无兼味，樽酒家贫只旧醅。肯与邻翁相对饮，隔篱呼取尽余杯。"},{"title":"登高","author":"杜甫","content":"风急天高猿啸哀，渚清沙白鸟飞回。无边落木萧萧下，不尽长江滚滚来。万里悲秋常作客，百年多病独登台。艰难苦恨繁霜鬓，潦倒新停浊酒杯。"},{"title":"登岳阳楼","author":"杜甫","content":"昔闻洞庭水，今上岳阳楼。吴楚东南坼，乾坤日夜浮。亲朋无一字，老病有孤舟。戎马关山北，凭轩涕泗流。"},{"title":"琵琶行","author":"白居易","content":"浔阳江头夜送客，枫叶荻花秋瑟瑟。主人下马客在船，举酒欲饮无管弦。醉不成欢惨将别，别时茫茫江浸月。忽闻水上琵琶声，主人忘归客不发。寻声暗问弹者谁，琵琶声停欲语迟。移船相近邀相见，添酒回灯重开宴。千呼万唤始出来，犹抱琵琶半遮面。转轴拨弦三两声，未成曲调先有情。弦弦掩抑声声思，似诉平生不得志。低眉信手续续弹，说尽心中无限事。轻拢慢捻抹复挑，初为《霓裳》后《六幺》。大弦嘈嘈如急雨，小弦切切如私语。嘈嘈切切错杂弹，大珠小珠落玉盘。间关莺语花底滑，幽咽泉流冰下难。冰泉冷涩弦凝绝，凝绝不通声暂歇。别有幽愁暗恨生，此时无声胜有声。银瓶乍破水浆迸，铁骑突出刀枪鸣。曲终收拨当心画，四弦一声如裂帛。东船西舫悄无言，唯见江心秋月白。沉吟放拨插弦中，整顿衣裳起敛容。自言本是京城女，家在虾蟆陵下住。十三学得琵琶成，名属教坊第一部。曲罢曾教善才服，妆成每被秋娘妒。五陵年少争缠头，一曲红绡不知数。钿头银篦击节碎，血色罗裙翻酒污。今年欢笑复明年，秋月春风等闲度。弟走从军阿姨死，暮去朝来颜色故。门前冷落鞍马稀，老大嫁作商人妇。商人重利轻别离，前月浮梁买茶去。去来江口守空船，绕船月明江水寒。夜深忽梦少年事，梦啼妆泪红阑干。我闻琵琶已叹息，又闻此语重唧唧。同是天涯沦落人，相逢何必曾相识！我从去年辞帝京，谪居卧病浔阳城。浔阳地僻无音乐，终岁不闻丝竹声。住近湓江地低湿，黄芦苦竹绕宅生。其间旦暮闻何物？杜鹃啼血猿哀鸣。春江花朝秋月夜，往往取酒还独倾。岂无山歌与村笛，呕哑嘲哳难为听。今夜闻君琵琶语，如听仙乐耳暂明。莫辞更坐弹一曲，为君翻作《琵琶行》。感我此言良久立，却坐促弦弦转急。凄凄不似向前声，满座重闻皆掩泣。座中泣下谁最多？江州司马青衫湿。"},{"title":"李凭箜篌引","author":"李贺","content":"吴丝蜀桐张高秋，空山凝云颓不流。江娥啼竹素女愁，李凭中国弹箜篌。昆山玉碎凤凰叫，芙蓉泣露香兰笑。十二门前融冷光，二十三丝动紫皇。女娲炼石补天处，石破天惊逗秋雨。梦入神山教神妪，老鱼跳波瘦蛟舞。吴质不眠倚桂树，露脚斜飞湿寒兔。"},{"title":"菩萨蛮（小山重叠金明灭）","author":"温庭筠","content":"小山重叠金明灭，鬓云欲度香腮雪。懒起画蛾眉，弄妆梳洗迟。照花前后镜，花面交相映。新贴绣罗襦，双双金鹧鸪。"},{"title":"锦瑟","author":"李商隐","content":"锦瑟无端五十弦，一弦一柱思华年。庄生晓梦迷蝴蝶，望帝春心托杜鹃。沧海月明珠有泪，蓝田日暖玉生烟。此情可待成追忆，只是当时已惘然。"},{"title":"虞美人（春花秋月何时了）","author":"李煜","content":"春花秋月何时了？往事知多少。小楼昨夜又东风，故国不堪回首月明中。雕栏玉砌应犹在，只是朱颜改。问君能有几多愁？恰似一江春水向东流。"},{"title":"望海潮（东南形胜）","author":"柳永","content":"东南形胜，三吴都会，钱塘自古繁华。烟柳画桥，风帘翠幕，参差十万人家。云树绕堤沙，怒涛卷霜雪，天堑无涯。市列珠玑，户盈罗绮，竞豪奢。重湖叠𪩘清嘉，有三秋桂子，十里荷花。羌管弄晴，菱歌泛夜，嬉嬉钓叟莲娃。千骑拥高牙，乘醉听箫鼓，吟赏烟霞。异日图将好景，归去凤池夸。"},{"title":"桂枝香·金陵怀古","author":"王安石","content":"登临送目，正故国晚秋，天气初肃。千里澄江似练，翠峰如簇。归帆去棹残阳里，背西风，酒旗斜矗。彩舟云淡，星河鹭起，画图难足。念往昔，繁华竞逐，叹门外楼头，悲恨相续。千古凭高对此，谩嗟荣辱。六朝旧事随流水，但寒烟衰草凝绿。至今商女，时时犹唱，后庭遗曲。"},{"title":"江城子·乙卯正月二十日夜记梦","author":"苏轼","content":"十年生死两茫茫。不思量，自难忘。千里孤坟，无处话凄凉。纵使相逢应不识，尘满面，鬓如霜。夜来幽梦忽还乡。小轩窗，正梳妆。相顾无言，惟有泪千行。料得年年肠断处，明月夜，短松冈。"},{"title":"念奴娇·赤壁怀古","author":"苏轼","content":"大江东去，浪淘尽，千古风流人物。故垒西边，人道是，三国周郎赤壁。乱石穿空，惊涛拍岸，卷起千堆雪。江山如画，一时多少豪杰。遥想公瑾当年，小乔初嫁了，雄姿英发。羽扇纶巾，谈笑间，樯橹灰飞烟灭。故国神游，多情应笑我，早生华发。人生如梦，一尊还酹江月。"},{"title":"登快阁","author":"黄庭坚","content":"痴儿了却公家事，快阁东西倚晚晴。落木千山天远大，澄江一道月分明。朱弦已为佳人绝，青眼聊因美酒横。万里归船弄长笛，此心吾与白鸥盟。"},{"title":"鹊桥仙（纤云弄巧）","author":"秦观","content":"纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。柔情似水，佳期如梦，忍顾鹊桥归路！两情若是久长时，又岂在朝朝暮暮。"},{"title":"苏幕遮（燎沉香）","author":"周邦彦","content":"燎沉香，消溽暑。鸟雀呼晴，侵晓窥檐语。叶上初阳干宿雨，水面清圆，一一风荷举。故乡遥，何日去？家住吴门，久作长安旅。五月渔郎相忆否？小楫轻舟，梦入芙蓉浦。"},{"title":"声声慢（寻寻觅觅）","author":"李清照","content":"寻寻觅觅，冷冷清清，凄凄惨惨戚戚。乍暖还寒时候，最难将息。三杯两盏淡酒，怎敌他、晚来风急！雁过也，正伤心，却是旧时相识。满地黄花堆积，憔悴损，如今有谁堪摘？守着窗儿，独自怎生得黑！梧桐更兼细雨，到黄昏、点点滴滴。这次第，怎一个愁字了得！"},{"title":"书愤（早岁那知世事艰）","author":"陆游","content":"早岁那知世事艰，中原北望气如山。楼船夜雪瓜洲渡，铁马秋风大散关。塞上长城空自许，镜中衰鬓已先斑。出师一表真名世，千载谁堪伯仲间！"},{"title":"临安春雨初霁","author":"陆游","content":"世味年来薄似纱，谁令骑马客京华。小楼一夜听春雨，深巷明朝卖杏花。矮纸斜行闲作草，晴窗细乳戏分茶。素衣莫起风尘叹，犹及清明可到家。"},{"title":"念奴娇·过洞庭","author":"张孝祥","content":"洞庭青草，近中秋，更无一点风色。玉鉴琼田三万顷，着我扁舟一叶。素月分辉，明河共影，表里俱澄澈。悠然心会，妙处难与君说。应念岭海经年，孤光自照，肝肺皆冰雪。短发萧骚襟袖冷，稳泛沧浪空阔。尽挹西江，细斟北斗，万象为宾客。扣舷独啸，不知今夕何夕！"},{"title":"永遇乐·京口北固亭怀古","author":"辛弃疾","content":"千古江山，英雄无觅，孙仲谋处。舞榭歌台，风流总被，雨打风吹去。斜阳草树，寻常巷陌，人道寄奴曾住。想当年，金戈铁马，气吞万里如虎。元嘉草草，封狼居胥，赢得仓皇北顾。四十三年，望中犹记，烽火扬州路。可堪回首，佛狸祠下，一片神鸦社鼓。凭谁问：廉颇老矣，尚能饭否？"},{"title":"菩萨蛮·书江西造口壁","author":"辛弃疾","content":"郁孤台下清江水，中间多少行人泪？西北望长安，可怜无数山。青山遮不住，毕竟东流去。江晚正愁余，山深闻鹧鸪。"},{"title":"青玉案·元夕","author":"辛弃疾","content":"东风夜放花千树，更吹落、星如雨。宝马雕车香满路。凤箫声动，玉壶光转，一夜鱼龙舞。蛾儿雪柳黄金缕，笑语盈盈暗香去。众里寻他千百度，蓦然回首，那人却在，灯火阑珊处。"},{"title":"贺新郎（国脉微如缕）","author":"刘克庄","content":"国脉微如缕。问长缨何时入手，缚将戎主？未必人间无好汉，谁与宽些尺度？试看取当年韩五。岂有谷城公付授，也不干曾遇骊山母。谈笑起，两河路。少时棋柝曾联句。叹而今登楼揽镜，事机频误。闻说北风吹面急，边上冲梯屡舞。君莫道投鞭虚语，自古一贤能制难，有金汤便可无张许？快投笔，莫题柱。"},{"title":"扬州慢（淮左名都）","author":"姜夔","content":"淮左名都，竹西佳处，解鞍少驻初程。过春风十里，尽荠麦青青。自胡马窥江去后，废池乔木，犹厌言兵。渐黄昏，清角吹寒，都在空城。杜郎俊赏，算而今，重到须惊。纵豆蔻词工，青楼梦好，难赋深情。二十四桥仍在，波心荡，冷月无声。念桥边红药，年年知为谁生？"},{"title":"长亭送别（【正宫】【端正好】）","author":"王实甫","content":"【正宫】【端正好】碧云天，黄花地，西风紧，北雁南飞。晓来谁染霜林醉？总是离人泪。"},{"title":"朝天子·咏喇叭","author":"王磐","content":"喇叭，唢呐，曲儿小腔儿大。官船来往乱如麻，全仗你抬声价。军听了军愁，民听了民怕。哪里去辨甚么真共假？眼见的吹翻了这家，吹伤了那家，只吹的水尽鹅飞罢！"}];
    const DIVIDED_DATA = [{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子曰：“君子食无求饱，居无求安，敏于事而慎于言，就有道而正焉，可谓好学也已。”(《学而》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子曰：“人而不仁，如礼何？人而不仁，如乐何？”(《八佾》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子曰：“朝闻道，夕死可矣。”(《里仁》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子曰：“君子喻于义，小人喻于利。”(《里仁》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子曰：“见贤思齐焉，见不贤而内自省也。”(《里仁》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子曰：“质胜文则野，文胜质则史。文质彬彬，然后君子。”(《雍也》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["曾子曰：“士不可以不弘毅，任重而道远。仁以为己任，不亦重乎？死而后已，不亦远乎？”(《泰伯》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子曰：“譬如为山，未成一篑，止，吾止也。譬如平地，虽覆一篑，进，吾往也。”(《子罕》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子曰：“知者不惑，仁者不忧，勇者不惧。”(《子罕》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["颜渊问仁。子曰：“克己复礼为仁。一日克己复礼，天下归仁焉。为仁由己，而由人乎哉？”(《颜渊》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["颜渊曰：“请问其目。”子曰：“非礼勿视，非礼勿听，非礼勿言，非礼勿动。”颜渊曰：“回虽不敏，请事斯语矣。”(《颜渊》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子贡问曰：“有一言而可以终身行之者乎？”子曰：“其‘恕’乎！己所不欲，勿施于人。”(《卫灵公》)"]},{"title":"《论语》十二章","author":"孔子弟子及再传弟子","content":["子曰：“小子何莫学夫《诗》？《诗》可以兴，可以观，可以群，可以怨。迩之事父，远之事君。多识于鸟兽草木之名。”(《阳货》)"]},{"title":"劝学","author":"《荀子》","content":["君子曰：学不可以已。青，取之于蓝，而青于蓝；冰，水为之，而寒于水。"]},{"title":"劝学","author":"《荀子》","content":["木直中绳，𫐓以为轮，其曲中规。"]},{"title":"劝学","author":"《荀子》","content":["虽有槁暴，不复挺者，𫐓使之然也。"]},{"title":"劝学","author":"《荀子》","content":["故木受绳则直，金就砺则利，君子博学而日参省乎己，则知明而行无过矣。"]},{"title":"劝学","author":"《荀子》","content":["吾尝终日而思矣，不如须臾之所学也；吾尝跂而望矣，不如登高之博见也。"]},{"title":"劝学","author":"《荀子》","content":["登高而招，臂非加长也，而见者远；顺风而呼，声非加疾也，而闻者彰。"]},{"title":"劝学","author":"《荀子》","content":["假舆马者，非利足也，而致千里；假舟楫者，非能水也，而绝江河。"]},{"title":"劝学","author":"《荀子》","content":["君子生非异也，善假于物也。"]},{"title":"劝学","author":"《荀子》","content":["积土成山，风雨兴焉；积水成渊，蛟龙生焉；积善成德，而神明自得，圣心备焉。"]},{"title":"劝学","author":"《荀子》","content":["故不积跬步，无以至千里；不积小流，无以成江海。"]},{"title":"劝学","a :"谏太宗十思疏","author":"魏征","content":["虽董之以严刑，振之以威怒，终苟免而不怀仁，貌恭而不心服。"]},{"title":"谏太宗十思疏","author":"魏征","content":["怨不在大，可畏惟人；载舟覆舟，所宜深慎；奔车朽索，其可忽乎！"]},{"title":"谏太宗十思疏","author":"魏征","content":["君人者，诚能见可欲则思知足以自戒，将有作则思知止以安人，念高危则思谦冲而自牧，惧满溢则思江海下百川，乐盘游则思三驱以为度，"]},{"title":"谏太宗十思疏","author":"魏征","content":["忧懈怠则思慎始而敬终，虑壅蔽则思虚心以纳下，想谗邪则思正身以黜恶，恩所加则思无因喜以谬赏，罚所及则思无因怒而滥刑。"]},{"title":"谏太宗十思疏","author":"魏征","content":["总此十思，弘兹九德，简能而任之，择善而从之，则智者尽其谋，勇者竭其力，仁者播其惠，信者效其忠。"]},{"title":"谏太宗十思疏","author":"魏征","content":["文武争驰，在君无事，可以尽豫游之乐，可以养松、乔之寿，鸣琴垂拱，不言而化。"]},{"title":"谏太宗十思疏","author":"魏征","content":["何必劳神苦思，代下司职，役聪明之耳目，亏无为之大道哉！"]},{"title":"师说","author":"韩愈","content":["古之学者必有师。师者，所以传道受业解惑也。"]},{"title":"师说","author":"韩愈","content":["人非生而知之者，孰能无惑？"]},{"title":"师说","author":"韩愈","content":["惑而不从师，其为惑也，终不解矣。"]},{"title":"师说","author":"韩愈","content":["生乎吾前，其闻道也固先乎吾，吾从而师之；生乎吾后，其闻道也亦先乎吾，吾从而师之。"]},{"title":"师说","author":"韩愈","content":["吾师道也，夫庸知其年之先后生于吾乎？"]},{"title":"师说","author":"韩愈","content":["是故无贵无贱，无长无少，道之所存，师之所存也。"]},{"title":"师说","author":"韩愈","content":["嗟乎！师道之不传也久矣！欲人之无惑也难矣！"]},{"title":"师说","author":"韩愈","content":["古之圣人，其出人也远矣，犹且从师而问焉；今之众人，其下圣人也亦远矣，而耻学于师。是故圣益圣，愚益愚。"]},{"title":"师说","author":"韩愈","content":["圣人之所以为圣，愚人之所以为愚，其皆出于此乎？"]},{"title":"师说","author":"韩愈","content":["爱其子，择师而教之；于其身也，则耻师焉，惑矣。"]},{"title":"师说","author":"韩愈","content":["彼童子之师，授之书而习其句读者，非吾所谓传其道解其惑者也。"]},{"title":"师说","author":"韩愈","content":["句读之不知，惑之不解，或师焉，或不焉，小学而大遗，吾未见其明也。"]},{"title":"师说","author":"韩愈","content":["巫医乐师百工之人，不耻相师。士大夫之族，曰师曰弟子云者，则群聚而笑之。"]},{"title":"师说","author":"韩愈","content":["问之，则曰：“彼与彼年相若也，道相似也，位卑则足羞，官盛则近谀。”"]},{"title":"师说","author":"韩愈","content":["呜呼！师道之不复，可知矣。"]},{"title":"师说","author":"韩愈","content":["巫医乐师百工之人，君子不齿，今其智乃反不能及，其可怪也欤！"]},{"title":"师说","author":"韩愈","content":["圣人无常师。孔子师郯子、苌弘、师襄、老聃。郯子之徒，其贤不及孔子。"]},{"title":"师说","author":"韩愈","content":["孔子曰：三人行，则必有我师。"]},{"title":"师说","author":"韩愈","content":["是故弟子不必不如师，师不必贤于弟子，闻道有先后，术业有专攻，如是而已。"]},{"title":"师说","author":"韩愈","content":["李氏子蟠，年十七，好古文，六艺经传皆通习之，不拘于时，学于余。"]},{"title":"师说","author":"韩愈","content":["余嘉其能行古道，作《师说》以贻之。"]},{"title":"阿房宫赋","author":"杜牧","content":["六王毕，四海一，蜀山兀，阿房出。覆压三百余里，隔离天日。"]},{"title":"阿房宫赋","author":"杜牧","content":["骊山北构而西折，直走咸阳。二川溶溶，流入宫墙。"]},{"title":"阿房宫赋","author":"杜牧","content":["五步一楼，十步一阁；廊腰缦回，檐牙高啄；各抱地势，钩心斗角。"]},{"title":"阿房宫赋","author":"杜牧","content":["盘盘焉，囷囷焉，蜂房水涡，矗不知其几千万落。"]},{"title":"阿房宫赋","author":"杜牧","content":["长桥卧波，未云何龙？复道行空，不霁何虹？高低冥迷，不知西东。"]},{"title":"阿房宫赋","author":"杜牧","content":["歌台暖响，春光融融；舞殿冷袖，风雨凄凄。一日之内，一宫之间，而气候不齐。"]},{"title":"阿房宫赋","author":"杜牧","content":["妃嫔媵嫱，王子皇孙，辞楼下殿，辇来于秦。朝歌夜弦，为秦宫人。"]},{"title":"阿房宫赋","author":"杜牧","content":["明星荧荧，开妆镜也；绿云扰扰，梳晓鬟也；渭流涨腻，弃脂水也；烟斜雾横，焚椒兰也。"]},{"title":"阿房宫赋","author":"杜牧","content":["雷霆乍惊，宫车过也；辘辘远听，杳不知其所之也。"]},{"title":"阿房宫赋","author":"杜牧","content":["一肌一容，尽态极妍，缦立远视，而望幸焉。有不见者，三十六年。"]},{"title":"阿房宫赋","author":"杜牧","content":["燕赵之收藏，韩魏之经营，齐楚之精英，几世几年，剽掠其人，倚叠如山。一旦不能有，输来其间。"]},{"title":"阿房宫赋","author":"杜牧","content":["鼎铛玉石，金块珠砾，弃掷逦迤，秦人视之，亦不甚惜。"]},{"title":"阿房宫赋","author":"杜牧","content":["嗟乎！一人之心，千万人之心也。"]},{"title":"阿房宫赋","author":"杜牧","content":["秦爱纷奢，人亦念其家。奈何取之尽锱铢，用之如泥沙？"]},{"title":"阿房宫赋","author":"杜牧","content":["使负栋之柱，多于南亩之农夫；架梁之椽，多于机上之工女；钉头磷磷，多于在庾之粟粒；瓦缝参差，多于周身之帛缕；直栏横槛，多于九土之城郭；管弦呕哑，多于市人之言语。"]},{"title":"阿房宫赋","author":"杜牧","content":["使天下之人，不敢言而敢怒。独夫之心，日益骄固。"]},{"title":"阿房宫赋","author":"杜牧","content":["戍卒叫，函谷举，楚人一炬，可怜焦土！"]},{"title":"阿房宫赋","author":"杜牧","content":["呜呼！灭六国者六国也，非秦也；族秦者秦也，非天下也。"]},{"title":"阿房宫赋","author":"杜牧","content":["嗟乎！使六国各爱其人，则足以拒秦；使秦复爱六国之人，则递三世可至万世而为君，谁得而族灭也？"]},{"title":"阿房宫赋","author":"杜牧","content":["秦人不暇自哀，而后人哀之；后人哀之而不鉴之，亦使后人而复哀后人也。"]},{"title":"六国论","author":"苏洵","content":["六国破灭，非兵不利，战不善，弊在赂秦。赂秦而力亏，破灭之道也。"]},{"title":"六国论","author":"苏洵","content":["或曰：六国互丧，率赂秦耶？曰：不赂者以赂者丧。盖失强援，不能独完。故曰：弊在赂秦也。"]},{"title":"六国论","author":"苏洵","content":["秦以攻取之外，小则获邑，大则得城。"]},{"title":"六国论","author":"苏洵","content":["较秦之所得，与战胜而得者，其实百倍；诸侯之所亡，与战败而亡者，其实亦百倍。"]},{"title":"六国论","author":"苏洵","content":["则秦之所大欲，诸侯之所大患，固不在战矣。"]},{"title":"六国论","author":"苏洵","content":["思厥先祖父，暴霜露，斩荆棘，以有尺寸之地。"]},{"title":"六国论","author":"苏洵","content":["子孙视之不甚惜，举以予人，如弃草芥。"]},{"title":"六国论","author":"苏洵","content":["今日割五城，明日割十城，然后得一夕安寝。起视四境，而秦兵又至矣。"]},{"title":"六国论","author":"苏洵","content":["然则诸侯之地有限，暴秦之欲无厌，奉之弥繁，侵之愈急。故不战而强弱胜负已判矣。至于颠覆，理固宜然。"]},{"title":"六国论","author":"苏洵","content":["古人云：“以地事秦，犹抱薪救火，薪不尽，火不灭。”此言得之。"]},{"title":"六国论","author":"苏洵","content":["齐人未尝赂秦，终继五国迁灭，何哉？与嬴而不助五国也。五国既丧，齐亦不免矣。"]},{"title":"六国论","author":"苏洵","content":["燕赵之君，始有远略，能守其土，义不赂秦。"]},{"title":"六国论","author":"苏洵","content":["是故燕虽小国而后亡，斯用兵之效也。至丹以荆卿为计，始速祸焉。"]},{"title":"六国论","author":"苏洵","content":["赵尝五战于秦，二败而三胜。后秦击赵者再，李牧连却之。"]},{"title":"六国论","author":"苏洵","content":["洎牧以谗诛，邯郸为郡，惜其用武而不终也。"]},{"title":"六国论","author":"苏洵","content":["且燕赵处秦革灭殆尽之际，可谓智力孤危，战败而亡，诚不得已。"]},{"title":"六国论","author":"苏洵","content":["向使三国各爱其地，齐人勿附于秦，刺客不行，良将犹在，则胜负之数，存亡之理，当与秦相较，或未易量。"]},{"title":"六国论","author":"苏洵","content":["呜呼！以赂秦之地封天下之谋臣，以事秦之心礼天下之奇才，并力西向，则吾恐秦人食之不得下咽也。"]},{"title":"六国论","author":"苏洵","content":["悲夫！有如此之势，而为秦人积威之所劫，日削月割，以趋于亡。"]},{"title":"六国论","author":"苏洵","content":["为国者无使为积威之所劫哉！"]},{"title":"六国论","author":"苏洵","content":["夫六国与秦皆诸侯，其势弱于秦，而犹有可以不赂而胜之之势。"]},{"title":"六国论","author":"苏洵","content":["苟以天下之大，下而从六国破亡之故事，是又在六国下矣。"]},{"title":"答司马谏议书","author":"王安石","content":["某启：昨日蒙教，窃以为与君实游处相好之日久，而议事每不合，所操之术多异故也。"]},{"title":"答司马谏议书","author":"王安石","content":["虽欲强聒，终必不蒙见察，故略上报，不复一一自辨。"]},{"title":"答司马谏议书","author":"王安石","content":["重念蒙君实视遇厚，于反覆不宜卤莽，故今具道所以，冀君实或见恕也。"]},{"title":"答司马谏议书","author":"王安石","content":["盖儒者所争，尤在于名实，名实已明，而天下之理得矣。"]},{"title":"答司马谏议书","author":"王安石","content":["今君实所以见教者，以为侵官、生事、征利、拒谏，以致天下怨谤也。"]},{"title":"答司马谏议书","author":"王安石","content":["某则以谓受命于人主，议法度而修之于朝廷，以授之于有司，不为侵官；举先王之政，以兴利除弊，不为生事；为天下理财，不为征利；辟邪说，难壬人，不为拒谏。"]},{"title":"答司马谏议书","author":"王安石","content":["至于怨诽之多，则固前知其如此也。"]},{"title":"答司马谏议书","author":"王安石","content":["人习于苟且非一日，士大夫多以不恤国事、同俗自媚于众为善，上乃欲变此，而某不量敌之众寡，欲出力助上以抗之，则众何为而不汹汹然？"]},{"title":"答司马谏议书","author":"王安石","content":["盘庚之迁，胥怨者民也，非特朝廷士大夫而已；盘庚不为怨者故改其度，度义而后动，是而不见可悔故也。"]},{"title":"答司马谏议书","author":"王安石","content":["如君实责我以在位久，未能助上大有为，以膏泽斯民，则某知罪矣；如曰今日当一切不事事，守前所为而已，则非某之所敢知。"]},{"title":"答司马谏议书","author":"王安石","content":["无由会晤，不任区区向往之至！"]},{"title":"赤壁赋","author":"苏轼","content":["壬戌之秋，七月既望，苏子与客泛舟游于赤壁之下。"]},{"title":"赤壁赋","author":"苏轼","content":["清风徐来，水波不兴。举酒属客，诵明月之诗，歌窈窕之章。"]},{"title":"赤壁赋","author":"苏轼","content":["少焉，月出于东山之上，徘徊于斗牛之间。"]},{"title":"赤壁赋","author":"苏轼","content":["白露横江，水光接天。纵一苇之所如，凌万顷之茫然。"]},{"title":"赤壁赋","author":"苏轼","content":["浩浩乎如冯虚御风，而不知其所止；飘飘乎如遗世独立，羽化而登仙。"]},{"title":"赤壁赋","author":"苏轼","content":["于是饮酒乐甚，扣舷而歌之。"]},{"title":"赤壁赋","author":"苏轼","content":["歌曰：“桂棹兮兰桨，击空明兮溯流光。渺渺兮予怀，望美人兮天一方。”"]},{"title":"赤壁赋","author":"苏轼","content":["客有吹洞箫者，倚歌而和之。"]},{"title":"赤壁赋","author":"苏轼","content":["其声呜呜然，如怨如慕，如泣如诉；余音袅袅，不绝如缕。"]},{"title":"赤壁赋","author":"苏轼","content":["舞幽壑之潜蛟，泣孤舟之嫠妇。"]},{"title":"赤壁赋","author":"苏轼","content":["苏子愀然，正襟危坐而问客曰：“何为其然也？”"]},{"title":"赤壁赋","author":"苏轼","content":["‘月明星稀，乌鹊南飞’，此非曹孟德之诗乎？"]},{"title":"赤壁赋","author":"苏轼","content":["西望夏口，东望武昌，山川相缪，郁乎苍苍，此非孟德之困于周郎者乎？"]},{"title":"赤壁赋","author":"苏轼","content":["方其破荆州，下江陵，顺流而东也，舳舻千里，旌旗蔽空，酾酒临江，横槊赋诗，固一世之雄也，而今安在哉？"]},{"title":"赤壁赋","author":"苏轼","content":["况吾与子渔樵于江渚之上，侣鱼虾而友麋鹿，驾一叶之扁舟，举匏樽以相属。"]},{"title":"赤壁赋","author":"苏轼","content":["寄蜉蝣于天地，渺沧海之一粟。哀吾生之须臾，羡长江之无穷。挟飞仙以遨游，抱明月而长终。知不可乎骤得，托遗响于悲风。"]},{"title":"赤壁赋","author":"苏轼","content":["客亦知夫水与月乎？逝者如斯，而未尝往也；盈虚者如彼，而卒莫消长也。"]},{"title":"赤壁赋","author":"苏轼","content":["盖将自其变者而观之，则天地曾不能以一瞬；自其不变者而观之，则物与我皆无尽也，而又何羡乎！"]},{"title":"赤壁赋","author":"苏轼","content":["且夫天地之间，物各有主，苟非吾之所有，虽一毫而莫取。"]},{"title":"赤壁赋","author":"苏轼","content":["惟江上之清风，与山间之明月，耳得之而为声，目遇之而成色，取之无禁，用之不竭，是造物者之无尽藏也，而吾与子之所共适。"]},{"title":"赤壁赋","author":"苏轼","content":["客喜而笑，洗盏更酌。肴核既尽，杯盘狼籍。相与枕藉乎舟中，不知东方之既白。"]},{"title":"项脊轩志","author":"归有光","content":["项脊轩，旧南阁子也。室仅方丈，可容一人居。"]},{"title":"项脊轩志","author":"归有光","content":["百年老屋，尘泥渗漉，雨泽下注；每移案，顾视无可置者。"]},{"title":"项脊轩志","author":"归有光","content":["又北向，不能得日，日过午已昏。余稍为修葺，使不上漏。"]},{"title":"项脊轩志","author":"归有光","content":["前辟四窗，垣墙周庭，以当南日，日影反照，室始洞然。"]},{"title":"项脊轩志","author":"归有光","content":["又杂植兰桂竹木于庭，旧时栏楯，亦遂增胜。"]},{"title":"项脊轩志","author":"归有光","content":["借书满架，偃仰啸歌，冥然兀坐，万籁有声；而庭阶寂寂，小鸟时来啄食，人至不去。"]},{"title":"项脊轩志","author":"归有光","content":["三五之夜，明月半墙，桂影斑驳，风移影动，珊珊可爱。"]},{"title":"项脊轩志","author":"归有光","content":["然余居于此，多可喜，亦多可悲。"]},{"title":"项脊轩志","author":"归有光","content":["先是庭中通南北为一。"]},{"title":"项脊轩志","author":"归有光","content":["迨诸父异爨，内外多置小门墙，往往而是，东犬西吠，客逾庖而宴，鸡栖于厅。"]},{"title":"项脊轩志","author":"归有光","content":["庭中始为篱，已为墙，凡再变矣。"]},{"title":"项脊轩志","author":"归有光","content":["家有老妪，尝居于此。妪，先大母婢也，乳二世，先妣抚之甚厚。"]},{"title":"项脊轩志","author":"归有光","content":["室西连于中闺，先妣尝一至。"]},{"title":"项脊轩志","author":"归有光","content":["妪每谓余曰：“某所，而母立于兹。”"]},{"title":"项脊轩志","author":"归有光","content":["妪又曰：“汝姊在吾怀，呱呱而泣；娘以指叩门扉曰：‘儿寒乎？欲食乎？’吾从板外相为应答。”语未毕，余泣，妪亦泣。"]},{"title":"项脊轩志","author":"归有光","content":["余自束发读书轩中，一日，大母过余曰：“吾儿，久不见若影，何竟日默默在此，大类女郎也？”"]},{"title":"项脊轩志","author":"归有光","content":["比去，以手阖门，自语曰：“吾家读书久不效，儿之成，则可待乎！”"]},{"title":"项脊轩志","author":"归有光","content":["顷之，持一象笏至，曰：“此吾祖太常公宣德间执此以朝，他日汝当用之！”"]},{"title":"项脊轩志","author":"归有光","content":["瞻顾遗迹，如在昨日，令人长号不自禁。"]},{"title":"项脊轩志","author":"归有光","content":["轩东故尝为厨，人往，从轩前过。"]},{"title":"项脊轩志","author":"归有光","content":["余扃牖而居，久之，能以足音辨人。"]},{"title":"项脊轩志","author":"归有光","content":["轩凡四遭火，得不焚，殆有神护者。"]},{"title":"项脊轩志","author":"归有光","content":["余既为此志，后五年，吾妻来归，时至轩中，从余问古事，或凭几学书。"]},{"title":"项脊轩志","author":"归有光","content":["吾妻归宁，述诸小妹语曰：“闻姊家有阁子，且何谓阁子也？”"]},{"title":"项脊轩志","author":"归有光","content":["其后六年，吾妻死，室坏不修。"]},{"title":"项脊轩志","author":"归有光","content":["其后二年，余久卧病无聊，乃使人复葺南阁子，其制稍异于前。然自后余多在外，不常居。"]},{"title":"项脊轩志","author":"归有光","content":["庭有枇杷树，吾妻死之年所手植也，今已亭亭如盖矣。"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["子路、曾皙、冉有、公西华侍坐。"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["子曰：“以吾一日长乎尔，毋吾以也。居则曰：‘不吾知也。’如或知尔，则何以哉？”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["子路率尔而对曰：“千乘之国，摄乎大国之间，加之以师旅，因之以饥馑；由也为之，比及三年，可使有勇，且知方也。”夫子哂之。"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["“求！尔何如？”对曰：“方六七十，如五六十，求也为之，比及三年，可使足民。如其礼乐，以俟君子。”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["“赤！尔何如？”对曰：“非曰能之，愿学焉。宗庙之事，如会同，端章甫，愿为小相焉。”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["“点！尔何如？”鼓瑟希，铿尔，舍瑟而作，对曰：“异乎三子者之撰。”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["子曰：“何伤乎？亦各言其志也。”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["曰：“莫春者，春服既成，冠者五六人，童子六七人，浴乎沂，风乎舞雩，咏而归。”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["夫子喟然叹曰：“吾与点也！”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["三子者出，曾皙后。曾皙曰：“夫三子者之言何如？”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["子曰：“亦各言其志也已矣。”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["曰：“夫子何哂由也？”曰：“为国以礼，其言不让，是故哂之。”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["“唯求则非邦也与？”“安见方六七十如五六十而非邦也者？”"]},{"title":"子路、曾晳、冉有、公西华侍坐","author":"《论语》","content":["“唯赤则非邦也与？”“宗庙会同，非诸侯而何？赤也为之小，孰能为之大？”"]},{"title":"报任安书","author":"司马迁","content":["古者富贵而名摩灭，不可胜记，唯倜傥非常之人称焉。"]},{"title":"报任安书","author":"司马迁","content":["盖文王拘而演《周易》；仲尼厄而作《春秋》；屈原放逐，乃赋《离骚》；左丘失明，厥有《国语》；"]},{"title":"报任安书","author":"司马迁","content":["孙子膑脚，《兵法》修列；不韦迁蜀，世传《吕览》；韩非囚秦，《说难》《孤愤》；《诗》三百篇，大底圣贤发愤之所为作也。"]},{"title":"报任安书","author":"司马迁","content":["此人皆意有所郁结，不得通其道，故述往事，思来者。"]},{"title":"报任安书","author":"司马迁","content":["乃如左丘无目，孙子断足，终不可用，退而论书策，以舒其愤，思垂空文以自见。"]},{"title":"报任安书","author":"司马迁","content":["仆窃不逊，近自托于无能之辞，网罗天下放失旧闻，略考其行事，综其终始，稽其成败兴坏之纪，上计轩辕，下至于兹，为十表，本纪十二，书八章，世家三十，列传七十，凡百三十篇。"]},{"title":"报任安书","author":"司马迁","content":["亦欲以究天人之际，通古今之变，成一家之言。"]},{"title":"报任安书","author":"司马迁","content":["草创未就，会遭此祸，惜其不成，是以就极刑而无愠色。"]},{"title":"报任安书","author":"司马迁","content":["仆诚以著此书，藏之名山，传之其人，通邑大都，则仆偿前辱之责，虽万被戮，岂有悔哉！"]},{"title":"报任安书","author":"司马迁","content":["然此可为智者道，难为俗人言也。"]},{"title":"过秦论（上）","author":"贾谊","content":["秦孝公据崤函之固，拥雍州之地，君臣固守以窥周室，有席卷天下，包举宇内，囊括四海之意，并吞八荒之心。"]},{"title":"过秦论（上）","author":"贾谊","content":["当是时也，商君佐之，内立法度，务耕织，修守战之具；外连衡而斗诸侯。"]},{"title":"过秦论（上）","author":"贾谊","content":["于是秦人拱手而取西河之外。"]},{"title":"过秦论（上）","author":"贾谊","content":["孝公既没，惠文、武、昭襄蒙故业，因遗策，南取汉中，西举巴、蜀，东割膏腴之地，北收要害之郡。"]},{"title":"过秦论（上）","author":"贾谊","content":["诸侯恐惧，会盟而谋弱秦，不爱珍器重宝肥饶之地，以致天下之士，合从缔交，相与为一。"]},{"title":"过秦论（上）","author":"贾谊","content":["当此之时，齐有孟尝，赵有平原，楚有春申，魏有信陵。"]},{"title":"过秦论（上）","author":"贾谊","content":["此四君者，皆明智而忠信，宽厚而爱人，尊贤而重士，约从离衡，兼韩、魏、燕、楚、齐、赵、宋、卫、中山之众。"]},{"title":"过秦论（上）","author":"贾谊","content":["于是六国之士，有甯越、徐尚、苏秦、杜赫之属为之谋，齐明、周最、陈轸、召滑、楼缓、翟景、苏厉、乐毅之徒通其意，吴起、孙膑、带佗、倪良、王廖、田忌、廉颇、赵奢之伦制其兵。"]},{"title":"过秦论（上）","author":"贾谊","content":["尝以十倍之地，百万之众，叩关而攻秦。"]},{"title":"过秦论（上）","author":"贾谊","content":["秦人开关延敌，九国之师，逡巡而不敢进。"]},{"title":"过秦论（上）","author":"贾谊","content":["秦无亡矢遗镞之费，而天下诸侯已困矣。"]},{"title":"过秦论（上）","author":"贾谊","content":["于是从散约败，争割地而赂秦。"]},{"title":"过秦论（上）","author":"贾谊","content":["秦有余力而制其弊，追亡逐北，伏尸百万，流血漂橹。"]},{"title":"过秦论（上）","author":"贾谊","content":["因利乘便，宰割天下，分裂山河。强国请服，弱国入朝。"]},{"title":"过秦论（上）","author":"贾谊","content":["延及孝文王、庄襄王，享国之日浅，国家无事。"]},{"title":"过秦论（上）","author":"贾谊","content":["及至始皇，奋六世之余烈，振长策而御宇内，吞二周而亡诸侯，履至尊而制六合，执敲扑而鞭笞天下，威振四海。"]},{"title":"过秦论（上）","author":"贾谊","content":["南取百越之地，以为桂林、象郡；百越之君，俯首系颈，委命下吏。"]},{"title":"过秦论（上）","author":"贾谊","content":["乃使蒙恬北筑长城而守藩篱，却匈奴七百余里；胡人不敢南下而牧马，士不敢弯弓而报怨。"]},{"title":"过秦论（上）","author":"贾谊","content":["于是废先王之道，焚百家之言，以愚黔首；隳名城，杀豪杰；收天下之兵，聚之咸阳，销锋镝，铸以为金人十二，以弱天下之民。"]},{"title":"过秦论（上）","author":"贾谊","content":["然后践华为城，因河为池，据亿丈之城，临不测之渊，以为固。"]},{"title":"过秦论（上）","author":"贾谊","content":["良将劲弩守要害之处，信臣精卒陈利兵而谁何。"]},{"title":"过秦论（上）","author":"贾谊","content":["天下已定，始皇之心，自以为关中之固，金城千里，子孙帝王万世之业也。"]},{"title":"过秦论（上）","author":"贾谊","content":["始皇既没，余威震于殊俗。"]},{"title":"过秦论（上）","author":"贾谊","content":["然陈涉瓮牖绳枢之子，氓隶之人，而迁徙之徒也；才能不及中人，非有仲尼、墨翟之贤，陶朱、猗顿之富；"]},{"title":"过秦论（上）","author":"贾谊","content":["蹑足行伍之间，而倔起阡陌之中，率疲弊之卒，将数百之众，转而攻秦；斩木为兵，揭竿为旗，天下云集响应，赢粮而景从。"]},{"title":"过秦论（上）","author":"贾谊","content":["山东豪俊遂并起而亡秦族矣。"]},{"title":"过秦论（上）","author":"贾谊","content":["且夫天下非小弱也，雍州之地，崤函之固，自若也。"]},{"title":"过秦论（上）","author":"贾谊","content":["陈涉之位，非尊于齐、楚、燕、赵、韩、魏、宋、卫、中山之君也；"]},{"title":"过秦论（上）","author":"贾谊","content":["锄櫌棘矜，非铦于钩戟长铩也；谪戍之众，非抗于九国之师也；深谋远虑，行军用兵之道，非及乡时之士也。"]},{"title":"过秦论（上）","author":"贾谊","content":["然而成败异变，功业相反，何也？"]},{"title":"过秦论（上）","author":"贾谊","content":["试使山东之国与陈涉度长絜大，比权量力，则不可同年而语矣。"]},{"title":"过秦论（上）","author":"贾谊","content":["然秦以区区之地，致万乘之势，序八州而朝同列，百有余年矣；然后以六合为家，崤函为宫；一夫作难而七庙隳，身死人手，为天下笑者，何也？"]},{"title":"过秦论（上）","author":"贾谊","content":["仁义不施而攻守之势异也。"]},{"title":"礼运","author":"《礼记》","content":["大道之行也，天下为公。"]},{"title":"礼运","author":"《礼记》","content":["选贤与能，讲信修睦。"]},{"title":"礼运","author":"《礼记》","content":["故人不独亲其亲，不独子其子，使老有所终，壮有所用，幼有所长，矜、寡、孤、独、废疾者皆有所养，男有分，女有归。"]},{"title":"礼运","author":"《礼记》","content":["货恶其弃于地也，不必藏于己；力恶其不出于身也，不必为己。"]},{"title":"礼运","author":"《礼记》","content":["是故谋闭而不兴，盗窃乱贼而不作，故外户而不闭。是谓大同。"]},{"title":"陈情表","author":"李密","content":["臣密言：臣以险衅，夙遭闵凶。"]},{"title":"陈情表","author":"李密","content":["生孩六月，慈父见背；行年四岁，舅夺母志。"]},{"title":"陈情表","author":"李密","content":["祖母刘愍臣孤弱，躬亲抚养。"]},{"title":"陈情表","author":"李密","content":["臣少多疾病，九岁不行，零丁孤苦，至于成立。"]},{"title":"陈情表","author":"李密","content":["既无伯叔，终鲜兄弟，门衰祚薄，晚有儿息。"]},{"title":"陈情表","author":"李密","content":["外无期功强近之亲，内无应门五尺之僮，茕茕孑立，形影相吊。"]},{"title":"陈情表","author":"李密","content":["而刘夙婴疾病，常在床蓐，臣侍汤药，未曾废离。"]},{"title":"陈情表","author":"李密","content":["逮奉圣朝，沐浴清化。前太守臣逵察臣孝廉，后刺史臣荣举臣秀才。"]},{"title":"陈情表","author":"李密","content":["臣以供养无主，辞不赴命。诏书特下，拜臣郎中，寻蒙国恩，除臣洗马。"]},{"title":"陈情表","author":"李密","content":["猥以微贱，当侍东宫，非臣陨首所能上报。臣具以表闻，辞不就职。"]},{"title":"陈情表","author":"李密","content":["诏书切峻，责臣逋慢；郡县逼迫，催臣上道；州司临门，急于星火。"]},{"title":"陈情表","author":"李密","content":["臣欲奉诏奔驰，则刘病日笃；欲苟顺私情，则告诉不许：臣之进退，实为狼狈。"]},{"title":"陈情表","author":"李密","content":["伏惟圣朝以孝治天下，凡在故老，犹蒙矜育，况臣孤苦，特为尤甚。"]},{"title":"陈情表","author":"李密","content":["且臣少仕伪朝，历职郎署，本图宦达，不矜名节。"]},{"title":"陈情表","author":"李密","content":["今臣亡国贱俘，至微至陋，过蒙拔擢，宠命优渥，岂敢盘桓，有所希冀。"]},{"title":"陈情表","author":"李密","content":["但以刘日薄西山，气息奄奄，人命危浅，朝不虑夕。"]},{"title":"陈情表","author":"李密","content":["臣无祖母，无以至今日；祖母无臣，无以终余年。"]},{"title":"陈情表","author":"李密","content":["母、孙二人，更相为命，是以区区不能废远。"]},{"title":"陈情表","author":"李密","content":["臣密今年四十有四，祖母今年九十有六，是臣尽节于陛下之日长，报养刘之日短也。乌鸟私情，愿乞终养。"]},{"title":"陈情表","author":"李密","content":["臣之辛苦，非独蜀之人士及二州牧伯所见明知，皇天后土实所共鉴。"]},{"title":"陈情表","author":"李密","content":["愿陛下矜愍愚诚，听臣微志，庶刘侥幸，保卒余年。"]},{"title":"陈情表","author":"李密","content":["臣生当陨首，死当结草。臣不胜犬马怖惧之情，谨拜表以闻。"]},{"title":"归去来兮辞","author":"陶潜","content":["归去来兮，田园将芜胡不归？"]},{"title":"归去来兮辞","author":"陶潜","content":["既自以心为形役，奚惆怅而独悲？"]},{"title":"归去来兮辞","author":"陶潜","content":["悟已往之不谏，知来者之可追。"]},{"title":"归去来兮辞","author":"陶潜","content":["实迷途其未远，觉今是而昨非。"]},{"title":"归去来兮辞","author":"陶潜","content":["舟遥遥以轻飏，风飘飘而吹衣。"]},{"title":"归去来兮辞","author":"陶潜","content":["问征夫以前路，恨晨光之熹微。"]},{"title":"归去来兮辞","author":"陶潜","content":["乃瞻衡宇，载欣载奔。僮仆欢迎，稚子候门。"]},{"title":"归去来兮辞","author":"陶潜","content":["三径就荒，松菊犹存。携幼入室，有酒盈樽。"]},{"title":"归去来兮辞","author":"陶潜","content":["引壶觞以自酌，眄庭柯以怡颜。"]},{"title":"归去来兮辞","author":"陶潜","content":["倚南窗以寄傲，审容膝之易安。"]},{"title":"归去来兮辞","author":"陶潜","content":["园日涉以成趣，门虽设而常关。"]},{"title":"归去来兮辞","author":"陶潜","content":["策扶老以流憩，时矫首而遐观。"]},{"title":"归去来兮辞","author":"陶潜","content":["云无心以出岫，鸟倦飞而知还。"]},{"title":"归去来兮辞","author":"陶潜","content":["景翳翳以将入，抚孤松而盘桓。"]},{"title":"归去来兮辞","author":"陶潜","content":["归去来兮，请息交以绝游。"]},{"title":"归去来兮辞","author":"陶潜","content":["世与我而相违，复驾言兮焉求？"]},{"title":"归去来兮辞","author":"陶潜","content":["悦亲戚之情话，乐琴书以消忧。"]},{"title":"归去来兮辞","author":"陶潜","content":["农人告余以春及，将有事于西畴。"]},{"title":"归去来兮辞","author":"陶潜","content":["或命巾车，或棹孤舟。"]},{"title":"归去来兮辞","author":"陶潜","content":["既窈窕以寻壑，亦崎岖而经丘。"]},{"title":"归去来兮辞","author":"陶潜","content":["木欣欣以向荣，泉涓涓而始流。"]},{"title":"归去来兮辞","author":"陶潜","content":["善万物之得时，感吾生之行休。"]},{"title":"归去来兮辞","author":"陶潜","content":["已矣乎！寓形宇内复几时？曷不委心任去留？胡为乎遑遑欲何之？"]},{"title":"归去来兮辞","author":"陶潜","content":["富贵非吾愿，帝乡不可期。"]},{"title":"归去来兮辞","author":"陶潜","content":["怀良辰以孤往，或植杖而耘耔。"]},{"title":"归去来兮辞","author":"陶潜","content":["登东皋以舒啸，临清流而赋诗。"]},{"title":"归去来兮辞","author":"陶潜","content":["聊乘化以归尽，乐夫天命复奚疑！"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["郭橐驼，不知始何名。病偻，隆然伏行，有类橐驼者，故乡人号之“驼”。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["驼闻之曰：“甚善。名我固当。”"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["因舍其名，亦自谓“橐驼”云。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["其乡曰丰乐乡，在长安西。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["驼业种树，凡长安豪富人为观游及卖果者，皆争迎取养。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["视驼所种树，或移徙，无不活；且硕茂，早实以蕃。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["他植者虽窥伺效慕，莫能如也。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["橐驼非能使木寿且孳也，能顺木之天，以致其性焉尔。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["凡植木之性，其本欲舒，其培欲平，其土欲故，其筑欲密。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["既然已，勿动勿虑，去不复顾。其莳也若子，其置也若弃，则其天者全而其性得矣。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["故吾不害其长而已，非有能硕茂之也；不抑耗其实而已，非有能早而蕃之也。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["他植者则不然。根拳而土易，其培之也，若不过焉则不及。苟有能反是者，则又爱之太恩，忧之太勤。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["旦视而暮抚，已去而复顾。甚者，爪其肤以验其生枯，摇其本以观其疏密，而木之性日以离矣。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["虽曰爱之，其实害之；虽曰忧之，其实仇之；故不我若也。吾又何能为哉！"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["问者曰：“以子之道，移之官理，可乎？”"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["我知种树而已，理，非吾业也。然吾居乡，见长人者好烦其令，若甚怜焉，而卒以祸。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["旦暮吏来而呼曰：‘官命促尔耕，勖尔植，督尔获，早缫而绪，早织而缕，字而幼孩，遂而鸡豚。’鸣鼓而聚之，击木而召之。"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["吾小人辍飧饔以劳吏者，且不得暇，又何以蕃吾生而安吾性耶？故病且怠。若是，则与吾业者其亦有类乎？"]},{"title":"种树郭橐驼传","author":"柳宗元","content":["问者曰：“嘻，不亦善夫！吾问养树，得养人术。”传其事以为官戒也。"]},{"title":"五代史伶官传序","author":"欧阳修","content":["呜呼！盛衰之理，虽曰天命，岂非人事哉！"]},{"title":"五代史伶官传序","author":"欧阳修","content":["原庄宗之所以得天下，与其所以失之者，可以知之矣。"]},{"title":"五代史伶官传序","author":"欧阳修","content":["世言晋王之将终也，以三矢赐庄宗而告之曰："]},{"title":"五代史伶官传序","author":"欧阳修","content":["梁，吾仇也；燕王吾所立，契丹与吾约为兄弟，而皆背晋以归梁。此三者，吾遗恨也。与尔三矢，尔其无忘乃父之志！"]},{"title":"五代史伶官传序","author":"欧阳修","content":["庄宗受而藏之于庙。其后用兵，则遣从事以一少牢告庙，请其矢，盛以锦囊，负而前驱，及凯旋而纳之。"]},{"title":"五代史伶官传序","author":"欧阳修","content":["方其系燕父子以组，函梁君臣之首，入于太庙，还矢先王，而告以成功，其意气之盛，可谓壮哉！"]},{"title":"五代史伶官传序","author":"欧阳修","content":["及仇雠已灭，天下已定，一夫夜呼，乱者四应，仓皇东出，未及见贼而士卒离散，君臣相顾，不知所归，至于誓天断发，泣下沾襟，何其衰也！"]},{"title":"五代史伶官传序","author":"欧阳修","content":["岂得之难而失之易欤？抑本其成败之迹，而皆自于人欤？"]},{"title":"五代史伶官传序","author":"欧阳修","content":["《书》曰：“满招损，谦得益。”忧劳可以兴国，逸豫可以亡身，自然之理也。"]},{"title":"五代史伶官传序","author":"欧阳修","content":["故方其盛也，举天下之豪杰，莫能与之争；及其衰也，数十伶人困之，而身死国灭，为天下笑。"]},{"title":"五代史伶官传序","author":"欧阳修","content":["夫祸患常积于忽微，而智勇多困于所溺，岂独伶人也哉？"]},{"title":"石钟山记","author":"苏轼","content":["《水经》云：“彭蠡之口有石钟山焉。”"]},{"title":"石钟山记","author":"苏轼","content":["郦元以为下临深潭，微风鼓浪，水石相搏，声如洪钟。是说也，人常疑之。"]},{"title":"石钟山记","author":"苏轼","content":["今以钟磬置水中，虽大风浪不能鸣也，而况石乎！"]},{"title":"石钟山记","author":"苏轼","content":["至唐李渤始访其遗踪，得双石于潭上，扣而聆之，南声函胡，北音清越，桴止响腾，余韵徐歇。自以为得之矣。"]},{"title":"石钟山记","author":"苏轼","content":["然是说也，余尤疑之。石之铿然有声者，所在皆是也，而此独以钟名，何哉？"]},{"title":"石钟山记","author":"苏轼","content":["元丰七年六月丁丑，余自齐安舟行适临汝，而长子迈将赴饶之德兴尉，送之至湖口，因得观所谓石钟者。"]},{"title":"石钟山记","author":"苏轼","content":["寺僧使小童持斧，于乱石间择其一二扣之，硿硿焉。余固笑而不信也。"]},{"title":"石钟山记","author":"苏轼","content":["至暮夜月明，独与迈乘小舟，至绝壁下。"]},{"title":"石钟山记","author":"苏轼","content":["大石侧立千尺，如猛兽奇鬼，森然欲搏人；而山上栖鹘，闻人声亦惊起，磔磔云霄间；又有若老人咳且笑于山谷中者，或曰此鹳鹤也。"]},{"title":"石钟山记","author":"苏轼","content":["余方心动欲还，而大声发于水上，噌吰如钟鼓不绝。舟人大恐。"]},{"title":"石钟山记","author":"苏轼","content":["徐而察之，则山下皆石穴罅，不知其浅深，微波入焉，涵澹澎湃而为此也。"]},{"title":"石钟山记","author":"苏轼","content":["舟回至两山间，将入港口，有大石当中流，可坐百人，空中而多窍，与风水相吞吐，有窾坎镗鞳之声，与向之噌吰者相应，如乐作焉。"]},{"title":"石钟山记","author":"苏轼","content":["因笑谓迈曰：“汝识之乎？噌吰者，周景王之无射也；窾坎镗鞳者，魏庄子之歌钟也。古之人不余欺也！”"]},{"title":"石钟山记","author":"苏轼","content":["事不目见耳闻，而臆断其有无，可乎？"]},{"title":"石钟山记","author":"苏轼","content":["郦元之所见闻，殆与余同，而言之不详；士大夫终不肯以小舟夜泊绝壁之下，故莫能知；而渔工水师虽知而不能言。"]},{"title":"石钟山记","author":"苏轼","content":["此世所以不传也。而陋者乃以斧斤考击而求之，自以为得其实。"]},{"title":"石钟山记","author":"苏轼","content":["余是以记之，盖叹郦元之简，而笑李渤之陋也。"]},{"title":"登泰山记","author":"姚鼐","content":["泰山之阳，汶水西流；其阴，济水东流。阳谷皆入汶，阴谷皆入济。"]},{"title":"登泰山记","author":"姚鼐","content":["当其南北分者，古长城也。最高日观峰，在长城南十五里。"]},{"title":"登泰山记","author":"姚鼐","content":["余以乾隆三十九年十二月，自京师乘风雪，历齐河、长清，穿泰山西北谷，越长城之限，至于泰安。"]},{"title":"登泰山记","author":"姚鼐","content":["是月丁未，与知府朱孝纯子颍由南麓登。"]},{"title":"登泰山记","author":"姚鼐","content":["四十五里，道皆砌石为磴，其级七千有余。"]},{"title":"登泰山记","author":"姚鼐","content":["泰山正南面有三谷。中谷绕泰安城下，郦道元所谓环水也。"]},{"title":"登泰山记","author":"姚鼐","content":["余始循以入，道少半，越中岭，复循西谷，遂至其巅。"]},{"title":"登泰山记","author":"姚鼐","content":["古时登山，循东谷入，道有天门。"]},{"title":"登泰山记","author":"姚鼐","content":["东谷者，古谓之天门溪水，余所不至也。"]},{"title":"登泰山记","author":"姚鼐","content":["今所经中岭及山巅，崖限当道者，世皆谓之天门云。"]},{"title":"登泰山记","author":"姚鼐","content":["道中迷雾冰滑，磴几不可登。"]},{"title":"登泰山记","author":"姚鼐","content":["及既上，苍山负雪，明烛天南。"]},{"title":"登泰山记","author":"姚鼐","content":["望晚日照城郭，汶水、徂徕如画，而半山居雾若带然。"]},{"title":"登泰山记","author":"姚鼐","content":["戊申晦，五鼓，与子颍坐日观亭，待日出。大风扬积雪击面。"]},{"title":"登泰山记","author":"姚鼐","content":["亭东自足下皆云漫。稍见云中白若樗蒱数十立者，山也。"]},{"title":"登泰山记","author":"姚鼐","content":["极天云一线异色，须臾成五采。"]},{"title":"登泰山记","author":"姚鼐","content":["日上，正赤如丹，下有红光动摇承之。或曰，此东海也。"]},{"title":"登泰山记","author":"姚鼐","content":["回视日观以西峰，或得日或否，绛皓驳色，而皆若偻。"]},{"title":"登泰山记","author":"姚鼐","content":["亭西有岱祠，又有碧霞元君祠。皇帝行宫在碧霞元君祠东。"]},{"title":"登泰山记","author":"姚鼐","content":["是日观道中石刻，自唐显庆以来；其远古刻尽漫失。僻不当道者，皆不及往。"]},{"title":"登泰山记","author":"姚鼐","content":["山多石，少土。石苍黑色，多平方，少圜。"]},{"title":"登泰山记","author":"姚鼐","content":["少杂树，多松，生石罅，皆平顶。"]},{"title":"登泰山记","author":"姚鼐","content":["冰雪，无瀑水，无鸟兽音迹。"]},{"title":"登泰山记","author":"姚鼐","content":["至日观数里内无树，而雪与人膝齐。"]},{"title":"登泰山记","author":"姚鼐","content":["桐城姚鼐记。"]},{"title":"静女","author":"《诗经·邶风》","content":["静女其姝，俟我于城隅。爱而不见，搔首踟蹰。"]},{"title":"静女","author":"《诗经·邶风》","content":["静女其娈，贻我彤管。彤管有炜，说怿女美。"]},{"title":"静女","author":"《诗经·邶风》","content":["自牧归荑，洵美且异。匪女之为美，美人之贻。"]},{"title":"无衣","author":"《诗经·秦风》","content":["岂曰无衣？与子同袍。王于兴师，修我戈矛，与子同仇。"]},{"title":"无衣","author":"《诗经·秦风》","content":["岂曰无衣？与子同泽。王于兴师，修我矛戟，与子偕作。"]},{"title":"无衣","author":"《诗经·秦风》","content":["岂曰无衣？与子同裳。王于兴师，修我甲兵，与子偕行。"]},{"title":"离骚","author":"屈原","content":["帝高阳之苗裔兮，朕皇考曰伯庸。"]},{"title":"离骚","author":"屈原","content":["摄提贞于孟陬兮，惟庚寅吾以降。"]},{"title":"离骚","author":"屈原","content":["皇览揆余初度兮，肇锡余以嘉名。"]},{"title":"离骚","author":"屈原","content":["名余曰正则兮，字余曰灵均。"]},{"title":"离骚","author":"屈原","content":["纷吾既有此内美兮，又重之以修能。"]},{"title":"离骚","author":"屈原","content":["扈江离与辟芷兮，纫秋兰以为佩。"]},{"title":"离骚","author":"屈原","content":["汩余若将不及兮，恐年岁之不吾与。"]},{"title":"离骚","author":"屈原","content":["朝搴阰之木兰兮，夕揽洲之宿莽。"]},{"title":"离骚","author":"屈原","content":["日月忽其不淹兮，春与秋其代序。"]},{"title":"离骚","author":"屈原","content":["惟草木之零落兮，恐美人之迟暮。"]},{"title":"离骚","author":"屈原","content":["不抚壮而弃秽兮，何不改此度？"]},{"title":"离骚","author":"屈原","content":["乘骐骥以驰骋兮，来吾道夫先路！"]},{"title":"涉江采芙蓉","author":"《古诗十九首》","content":["涉江采芙蓉，兰泽多芳草。采之欲遗谁？所思在远道。"]},{"title":"涉江采芙蓉","author":"《古诗十九首》","content":["还顾望旧乡，长路漫浩浩。同心而离居，忧伤以终老。"]},{"title":"短歌行","author":"曹操","content":["对酒当歌，人生几何！譬如朝露，去日苦多。"]},{"title":"短歌行","author":"曹操","content":["慨当以慷，忧思难忘。何以解忧？唯有杜康。"]},{"title":"短歌行","author":"曹操","content":["青青子衿，悠悠我心。但为君故，沉吟至今。"]},{"title":"短歌行","author":"曹操","content":["呦呦鹿鸣，食野之苹。我有嘉宾，鼓瑟吹笙。"]},{"title":"短歌行","author":"曹操","content":["明明如月，何时可掇？忧从中来，不可断绝。"]},{"title":"短歌行","author":"曹操","content":["越陌度阡，枉用相存。契阔谈讌，心念旧恩。"]},{"title":"短歌行","author":"曹操","content":["月明星稀，乌鹊南飞。绕树三匝，何枝可依？"]},{"title":"短歌行","author":"曹操","content":["山不厌高，海不厌深。周公吐哺，天下归心。"]},{"title":"归园田居（其一）","author":"陶潜","content":["少无适俗韵，性本爱丘山。误落尘网中，一去三十年。"]},{"title":"归园田居（其一）","author":"陶潜","content":["羁鸟恋旧林，池鱼思故渊。开荒南野际，守拙归园田。"]},{"title":"归园田居（其一）","author":"陶潜","content":["方宅十余亩，草屋八九间。榆柳荫后檐，桃李罗堂前。"]},{"title":"归园田居（其一）","author":"陶潜","content":["暧暧远人村，依依墟里烟。狗吠深巷中，鸡鸣桑树颠。"]},{"title":"归园田居（其一）","author":"陶潜","content":["户庭无尘杂，虚室有余闲。久在樊笼里，复得返自然。"]},{"title":"拟行路难（其四）","author":"鲍照","content":["泻水置平地，各自东西南北流。"]},{"title":"拟行路难（其四）","author":"鲍照","content":["人生亦有命，安能行叹复坐愁！"]},{"title":"拟行路难（其四）","author":"鲍照","content":["酌酒以自宽，举杯断绝歌《路难》。"]},{"title":"拟行路难（其四）",     const STORAGE_KEY = "gaokao-poetry-flashcards-state-v3";

    const punctuationChars = "，。！？；：、,.!?;:（）()《》“”‘’ ";
    const punctuationSet = new Set(Array.from(punctuationChars));

    function getPoemKey(item) {
      return `${item.title}__${item.author}`;
    }

    function toLineText(content) {
      if (Array.isArray(content)) return content.map(String).join("");
      return String(content || "");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function clueMask(text) {
      const chars = Array.from(String(text || ""));
      return chars.map((char, index) => {
        if (punctuationSet.has(char)) return char;
        const prev = chars[index - 1];
        const next = chars[index + 1];
        const isStart = index === 0 || punctuationSet.has(prev);
        const isEnd = index === chars.length - 1 || punctuationSet.has(next);
        return isStart || isEnd ? char : "□";
      }).join("");
    }

    function shuffleArray(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function splitFallback(content) {
      return String(content || "")
        .split(/(?<=[。！？；])/u)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    const groupedDivided = new Map();
    DIVIDED_DATA.forEach((item) => {
      const key = getPoemKey(item);
      const entry = {
        title: item.title,
        author: item.author,
        text: toLineText(item.content),
      };
      if (!groupedDivided.has(key)) groupedDivided.set(key, []);
      groupedDivided.get(key).push(entry);
    });

    const poemCatalog = FULL_DATA.map((item) => {
      const key = getPoemKey(item);
      const lines = (groupedDivided.get(key) || []).map((entry) => entry.text);
      return {
        id: key,
        key,
        title: item.title,
        author: item.author,
        content: String(item.content || ""),
        lines: lines.length ? lines : splitFallback(item.content),
      };
    });

    const practiceCards = poemCatalog.flatMap((poem) =>
      poem.lines.map((line, index) => ({
        id: `line:${poem.key}:${index}`,
        key: poem.key,
        title: poem.title,
        author: poem.author,
        lines: poem.lines,
        line,
        prevLine: index > 0 ? poem.lines[index - 1] : "",
        nextLine: index < poem.lines.length - 1 ? poem.lines[index + 1] : "",
        lineIndex: index + 1,
        lineTotal: poem.lines.length,
      }))
    );

    const els = {
      summaryPoems: document.getElementById("summaryPoems"),
      summaryLines: document.getElementById("summaryLines"),
      poemSelect: document.getElementById("poemSelect"),
      sortRandomBtn: document.getElementById("sortRandomBtn"),
      sortOrderedBtn: document.getElementById("sortOrderedBtn"),
      statusText: document.getElementById("statusText"),
      progressBar: document.getElementById("progressBar"),
      modeHint: document.getElementById("modeHint"),
      cardShell: document.getElementById("cardShell"),
      flashCard: document.getElementById("flashCard"),
      frontFace: document.getElementById("frontFace"),
      backFace: document.getElementById("backFace"),
      prevBtn: document.getElementById("prevBtn"),
      flipBtn: document.getElementById("flipBtn"),
      nextBtn: document.getElementById("nextBtn"),
      randomBtn: document.getElementById("randomBtn"),
    };

    const pointerState = {
      startX: 0,
      startY: 0,
      moved: false,
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { selectedKey: "all", ordered: false, cardIndex: 0 };
        const parsed = JSON.parse(raw);
        return {
          selectedKey: typeof parsed.selectedKey === "string" ? parsed.selectedKey : "all",
          ordered: Boolean(parsed.ordered),
          cardIndex: Number.isInteger(parsed.cardIndex) ? parsed.cardIndex : 0,
        };
      } catch {
        return { selectedKey: "all", ordered: false, cardIndex: 0 };
      }
    }

    const state = loadState();
    let currentDeck = [];

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch {}
    }

    function fillPoemSelect() {
      const options = [
        '<option value="all">全部篇目</option>',
        ...poemCatalog.map((poem) =>
          `<option value="${escapeHtml(poem.key)}">${escapeHtml(`${poem.title} · ${poem.author}`)}</option>`
        ),
      ];
      els.poemSelect.innerHTML = options.join("");
      if (!poemCatalog.some((poem) => poem.key === state.selectedKey)) {
        state.selectedKey = "all";
      }
      els.poemSelect.value = state.selectedKey;
    }

    function buildDeck(preserveCardId = "") {
      const filtered = state.selectedKey === "all"
        ? practiceCards.slice()
        : practiceCards.filter((card) => card.key === state.selectedKey);

      currentDeck = state.ordered ? filtered : shuffleArray(filtered);
      if (!currentDeck.length) {
        state.cardIndex = 0;
        render();
        saveState();
        return;
      }

      const preservedIndex = preserveCardId
        ? currentDeck.findIndex((card) => card.id === preserveCardId)
        : -1;

      if (preservedIndex >= 0) {
        state.cardIndex = preservedIndex;
      } else if (state.cardIndex >= currentDeck.length) {
        state.cardIndex = currentDeck.length - 1;
      }

      render();
      saveState();
    }

    function setFlipped(flipped) {
      els.flashCard.classList.toggle("is-flipped", flipped);
      els.flipBtn.textContent = flipped ? "收起答案" : "翻卡";
    }

    function renderEmptyState() {
      const html = `
        <div class="empty-state">
          <div>
            <h2 class="card-title">没有找到对应卡片</h2>
            <p class="subtitle">换一个篇目后再继续练习。</p>
          </div>
        </div>
      `;
      els.frontFace.innerHTML = html;
      els.backFace.innerHTML = html;
      els.statusText.textContent = "当前筛选条件下没有卡片。";
      els.progressBar.style.width = "0%";
      els.prevBtn.disabled = true;
      els.nextBtn.disabled = true;
      els.randomBtn.disabled = true;
      setFlipped(false);
    }

    function renderPracticeFront(card) {
      const contextBox = card.prevLine
        ? `
          <div class="context-box">
            <span class="context-label">上一句</span>
            <p class="context-text subtle">${escapeHtml(card.prevLine)}</p>
          </div>
        `
        : `
          <div class="context-box">
            <span class="context-label">开篇提示</span>
            <p class="context-text subtle">这是这篇的第一句，先从开头默背。</p>
          </div>
        `;

      return `
        <div class="card-top">
          <span class="mini-chip">第 ${card.lineIndex} / ${card.lineTotal} 句</span>
        </div>
        <div class="card-heading">
          <h2 class="card-title">${escapeHtml(card.title)}</h2>
          <p class="card-author">${escapeHtml(card.author)}</p>
        </div>
        ${contextBox}
        <div class="prompt-box">
          <span class="prompt-label">默写这一句</span>
          <p class="masked-line">${escapeHtml(clueMask(card.line))}</p>
        </div>
        <p class="tip-text">先把这一句完整默写在心里，再翻面核对全文。连续练习时，可以把“上一句”当作接句提示。</p>
      `;
    }

    function renderPracticeBack(card) {
      const lines = card.lines.map((line, index) => `
        <div class="full-line ${index + 1 === card.lineIndex ? "is-target" : ""}" ${index + 1 === card.lineIndex ? 'data-target-line="true"' : ""}>
          <span class="line-no">${index + 1}</span>
          <p class="full-line-text">${escapeHtml(line)}</p>
        </div>
      `).join("");

      return `
        <div class="card-top">
          <span class="deck-badge">全文核对</span>
          <span class="mini-chip">高亮第 ${card.lineIndex} 句</span>
        </div>
        <div class="scroll-cue">卡片内滚动</div>
        <div class="card-heading">
          <h2 class="card-title">${escapeHtml(card.title)}</h2>
          <p class="card-author">${escapeHtml(card.author)}</p>
        </div>
        <div class="full-box">
          <div class="full-lines">${lines}</div>
        </div>
        <p class="tip-text">翻面后直接核对整篇，重点看高亮句的字词、顺序和上下句衔接，再回到正面重背一遍。</p>
      `;
    }

    function render() {
      els.poemSelect.value = state.selectedKey;
      els.sortRandomBtn.classList.toggle("active", !state.ordered);
      els.sortOrderedBtn.classList.toggle("active", state.ordered);
      els.modeHint.textContent = "空格翻卡";

      if (!currentDeck.length) {
        renderEmptyState();
        return;
      }

      const card = currentDeck[state.cardIndex];
      const total = currentDeck.length;
      const percent = ((state.cardIndex + 1) / total) * 100;
      const scope = state.selectedKey === "all" ? "全部篇目" : `${card.title}`;

      els.frontFace.innerHTML = renderPracticeFront(card);
      els.backFace.innerHTML = renderPracticeBack(card);
      els.frontFace.scrollTop = 0;
      els.backFace.scrollTop = 0;
      els.statusText.textContent = `${scope} · 第 ${state.cardIndex + 1} / ${total} 张${state.ordered ? " · 按篇目排序" : " · 已随机排序"}`;
      els.progressBar.style.width = `${percent}%`;
      els.prevBtn.disabled = total <= 1;
      els.nextBtn.disabled = total <= 1;
      els.randomBtn.disabled = total <= 1;
      setFlipped(false);
    }

    function flipCard() {
      if (!currentDeck.length) return;
      const next = !els.flashCard.classList.contains("is-flipped");
      setFlipped(next);
      if (next) {
        requestAnimationFrame(() => {
          const targetLine = els.backFace.querySelector("[data-target-line='true']");
          targetLine?.scrollIntoView({ block: "center", behavior: "smooth" });
        });
      }
    }

    function moveCard(step) {
      if (currentDeck.length <= 1) return;
      state.cardIndex = (state.cardIndex + step + currentDeck.length) % currentDeck.length;
      render();
      saveState();
    }

    function jumpRandom() {
      if (currentDeck.length <= 1) return;
      let nextIndex = state.cardIndex;
      while (nextIndex === state.cardIndex) {
        nextIndex = Math.floor(Math.random() * currentDeck.length);
      }
      state.cardIndex = nextIndex;
      render();
      saveState();
    }

    els.poemSelect.addEventListener("change", () => {
      state.selectedKey = els.poemSelect.value;
      state.cardIndex = 0;
      buildDeck();
    });

    els.sortRandomBtn.addEventListener("click", () => {
      const currentCard = currentDeck[state.cardIndex];
      state.ordered = false;
      buildDeck(currentCard ? currentCard.id : "");
    });

    els.sortOrderedBtn.addEventListener("click", () => {
      if (state.ordered) return;
      const currentCard = currentDeck[state.cardIndex];
      state.ordered = true;
      buildDeck(currentCard ? currentCard.id : "");
    });

    els.cardShell.addEventListener("pointerdown", (event) => {
      pointerState.startX = event.clientX;
      pointerState.startY = event.clientY;
      pointerState.moved = false;
    });

    els.cardShell.addEventListener("pointermove", (event) => {
      const dx = Math.abs(event.clientX - pointerState.startX);
      const dy = Math.abs(event.clientY - pointerState.startY);
      if (dx > 8 || dy > 8) {
        pointerState.moved = true;
      }
    });

    els.cardShell.addEventListener("click", (event) => {
      if (pointerState.moved) return;
      if (event.target.closest("button, select, input, label")) return;
      flipCard();
    });
    els.flipBtn.addEventListener("click", flipCard);
    els.prevBtn.addEventListener("click", () => moveCard(-1));
    els.nextBtn.addEventListener("click", () => moveCard(1));
    els.randomBtn.addEventListener("click", jumpRandom);

    document.addEventListener("keydown", (event) => {
      const tag = event.target && event.target.tagName;
      if (tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return;

      if (event.code === "Space") {
        event.preventDefault();
        flipCard();
        return;
      }
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        moveCard(-1);
        return;
      }
      if (event.key === "ArrowRight") {
        event.preventDefault();
        moveCard(1);
        return;
      }
      if (event.key.toLowerCase() === "r") {
        event.preventDefault();
        jumpRandom();
        return;
      }
      if (event.key.toLowerCase() === "s") {
        event.preventDefault();
        state.ordered = !state.ordered;
        const currentCard = currentDeck[state.cardIndex];
        buildDeck(currentCard ? currentCard.id : "");
      }
    });

    els.summaryPoems.textContent = String(poemCatalog.length);
    els.summaryLines.textContent = String(practiceCards.length);
    fillPoemSelect();
    buildDeck();
  </script>
</body>
</html>
